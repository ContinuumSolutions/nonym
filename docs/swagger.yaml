basePath: /
definitions:
  github_com_egokernel_ek1_internal_brain.PipelineResult:
    properties:
      accepted:
        description: 'passed Triage + Decide → Decision: Automated'
        type: integer
      ghosted:
        description: 'manipulation detected → Decision: Declined (ghost)'
        type: integer
      rejected:
        description: 'failed Triage or Decide → Decision: Declined'
        type: integer
      shield_reason:
        description: why shield was active
        type: string
      shielded:
        description: biometrics gate was active during this run
        type: boolean
      total:
        type: integer
    type: object
  github_com_egokernel_ek1_internal_datasync.ServiceStatus:
    properties:
      last_error:
        type: string
      last_sync_at:
        description: nil = never synced
        type: string
      signal_count:
        type: integer
      slug:
        type: string
    type: object
  internal_activities.Decision:
    enum:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    type: integer
    x-enum-varnames:
    - Pending
    - Accepted
    - Declined
    - Negotiated
    - Automated
    - Cancelled
  internal_activities.Event:
    properties:
      analysis:
        allOf:
        - $ref: '#/definitions/internal_activities.SignalAnalysis'
        description: LLM scores + triage rationale
      created_at:
        type: string
      decision:
        allOf:
        - $ref: '#/definitions/internal_activities.Decision'
        enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
      event_type:
        allOf:
        - $ref: '#/definitions/internal_activities.EventType'
        enum:
        - 0
        - 1
        - 2
        - 3
        - 4
        - 5
      gain:
        $ref: '#/definitions/internal_activities.Gain'
      id:
        type: integer
      importance:
        allOf:
        - $ref: '#/definitions/internal_activities.Importance'
        enum:
        - 0
        - 1
        - 2
      narrative:
        description: Detail description of exactly what happened
        type: string
      read:
        type: boolean
      source_service:
        type: string
      updated_at:
        type: string
    type: object
  internal_activities.EventType:
    enum:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    type: integer
    x-enum-varnames:
    - Finance
    - Calendar
    - Communication
    - Billing
    - Health
    - Other
  internal_activities.Gain:
    properties:
      _symbol:
        description: How to present the gain e.g $ for money type
        type: string
      _value:
        type: number
      details:
        type: string
      kind:
        allOf:
        - $ref: '#/definitions/internal_activities.GainKind'
        enum:
        - 0
        - 1
      type:
        allOf:
        - $ref: '#/definitions/internal_activities.GainType'
        enum:
        - 0
        - 1
    type: object
  internal_activities.GainKind:
    enum:
    - 0
    - 1
    type: integer
    x-enum-varnames:
    - Money
    - Time
  internal_activities.GainType:
    enum:
    - 0
    - 1
    type: integer
    x-enum-varnames:
    - Positive
    - Negative
  internal_activities.Importance:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-varnames:
    - Low
    - Medium
    - High
  internal_activities.SignalAnalysis:
    properties:
      decide_threshold:
        description: utility threshold at time of Decide
        type: number
      decide_utility:
        description: utility computed by Decide (if reached)
        type: number
      estimated_roi:
        description: USD value scored by LLM
        type: number
      manipulation_pct:
        description: 0–1 manipulation score
        type: number
      roi_threshold:
        description: minimum ROI the kernel required at triage
        type: number
      service_slug:
        type: string
      signal_title:
        type: string
      time_commitment:
        description: hours scored by LLM
        type: number
      triage_gate:
        description: financial_insignificance | manipulation | decide_utility | decide_risk
          | accepted
        type: string
    type: object
  internal_auth.pinReq:
    properties:
      pin_hash:
        type: string
    type: object
  internal_auth.unlockReq:
    properties:
      pin_hash:
        type: string
    type: object
  internal_biometrics.CheckIn:
    properties:
      created_at:
        type: string
      energy:
        type: integer
      extra_context:
        type: string
      mood:
        type: integer
      sleep:
        type: number
      stress_level:
        type: integer
      updated_at:
        type: string
    type: object
  internal_brain.KernelSnapshot:
    properties:
      decision_count:
        type: integer
      identity_entropy:
        type: number
      status:
        description: |-
          Status is the current operational mode of the kernel.
          ONLINE: normal autonomous operation.
          SHIELDED: biometrics gate active — elevated stress or poor sleep; decision threshold raised.
          H2HI: identity entropy spike — manual review required; call POST /brain/sync-acknowledge to resume.
          EXILED: reputation score below exile threshold; no external processing.
          enums: ONLINE,SHIELDED,H2HI,EXILED
        enum:
        - ONLINE
        - SHIELDED
        - H2HI
        - EXILED
        type: string
      values:
        $ref: '#/definitions/internal_brain.ValueMatrix'
    type: object
  internal_brain.StageProgress:
    properties:
      hand:
        type: integer
      shadow:
        type: integer
      voice:
        type: integer
    type: object
  internal_brain.StatusResponse:
    properties:
      decision_count:
        type: integer
      identity_entropy:
        type: number
      reputation_score:
        type: integer
      reputation_tier:
        type: string
      stage_progress:
        $ref: '#/definitions/internal_brain.StageProgress'
      status:
        description: |-
          Status is the current operational mode of the kernel.
          ONLINE: normal autonomous operation.
          SHIELDED: biometrics gate active — elevated stress or poor sleep; decision threshold raised.
          H2HI: identity entropy spike — manual review required; call POST /brain/sync-acknowledge to resume.
          EXILED: reputation score below exile threshold; no external processing.
          enums: ONLINE,SHIELDED,H2HI,EXILED
        enum:
        - ONLINE
        - SHIELDED
        - H2HI
        - EXILED
        type: string
      time_saved_today:
        description: minutes
        type: integer
      values:
        $ref: '#/definitions/internal_brain.ValueMatrix'
    type: object
  internal_brain.ValueMatrix:
    properties:
      baseHourlyRate:
        description: |-
          BaseHourlyRate is the user's baseline value of one hour (in USD).
          Used to compute the Cognitive Tax on time-consuming opportunities.
        format: float64
        type: number
      presentBiasDiscount:
        description: |-
          PresentBiasDiscount (ρ) is the user's personal discount rate for future rewards.
          Higher ρ = more present-biased (prefers immediate gains).
        format: float64
        type: number
      reputationImpact:
        description: |-
          ReputationImpact: how much the user cares about ledger cleanliness (0–1).
          HIGH priority. Predatory trades incur a reputation cost.
        format: float64
        type: number
      riskTolerance:
        description: |-
          RiskTolerance: 0.05 = very conservative, 0.90 = degen.
          MEDIUM priority. Mapped to a configurable σ.
        format: float64
        type: number
      socialEntropy:
        description: |-
          SocialEntropy: desire to maintain human-like friction (prevents appearing robotic).
          LOW priority. Set > 0 to inject periodic "irrational" human choices.
        format: float64
        type: number
      temporalSovereignty:
        description: |-
          TemporalSovereignty: how much the user values unstructured free time (0–1).
          CRITICAL priority. Any interaction yielding < 1.5× ROI on attention is culled.
        format: float64
        type: number
      utilityThreshold:
        description: |-
          UtilityThreshold is the minimum computed utility required to execute an action.
          Actions below this are automatically culled.
        format: float64
        type: number
    type: object
  internal_chat.Message:
    properties:
      content:
        type: string
      role:
        type: string
      timestamp:
        type: string
    type: object
  internal_chat.Request:
    properties:
      history:
        items:
          $ref: '#/definitions/internal_chat.Message'
        type: array
      message:
        type: string
    type: object
  internal_chat.Response:
    properties:
      reply:
        type: string
      timestamp:
        type: string
    type: object
  internal_harvest.ContactRecord:
    properties:
      favors_given:
        description: favours the contact gave to the user
        type: integer
      favors_received:
        description: favours the contact received from the user
        type: integer
      id:
        type: string
      last_contact:
        type: string
      name:
        type: string
      overlap:
        description: max 0-1 solution/bottleneck similarity seen
        type: number
    type: object
  internal_harvest.HarvestResult:
    properties:
      contacts_found:
        type: integer
      debts:
        items:
          $ref: '#/definitions/internal_harvest.SocialDebt'
        type: array
      opportunities:
        items:
          type: string
        type: array
      scanned_at:
        type: string
      total_value:
        type: number
    type: object
  internal_harvest.SocialDebt:
    properties:
      action:
        description: recommended next step
        type: string
      contact:
        $ref: '#/definitions/internal_harvest.ContactRecord'
      estimated_value:
        description: USD equivalent
        type: number
      net_favors:
        description: positive = contact owes the user
        type: integer
    type: object
  internal_integrations.AuthMethod:
    enum:
    - 0
    - 1
    type: integer
    x-enum-varnames:
    - APIKeyAuth
    - OAuth2Auth
  internal_integrations.ConnectInput:
    properties:
      api_key:
        type: string
      oauth_access_token:
        type: string
      oauth_refresh_token:
        type: string
    type: object
  internal_integrations.ConnectionStatus:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-comments:
      Connected: connected and active
      Disconnected: not installed
      Pending: credentials being entered
    x-enum-descriptions:
    - not installed
    - credentials being entered
    - connected and active
    x-enum-varnames:
    - Disconnected
    - Pending
    - Connected
  internal_integrations.Service:
    properties:
      api_endpoint:
        type: string
      api_key:
        description: masked on read, never raw
        type: string
      app_configured:
        description: |-
          AppConfigured is true once the user has saved their OAuth client_id/secret (BYOA).
          false → show "Set Up OAuth App"; true + !OAuthConnected → show "Authorize"; true + OAuthConnected → show "Disconnect"
        type: boolean
      auth_method:
        allOf:
        - $ref: '#/definitions/internal_integrations.AuthMethod'
        enum:
        - 0
        - 1
      category:
        type: string
      color:
        description: brand hex color, e.g. "#4285F4"; empty for custom services
        type: string
      created_at:
        type: string
      custom:
        type: boolean
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      oauth_connected:
        type: boolean
      slug:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/internal_integrations.ConnectionStatus'
        enum:
        - 0
        - 1
        - 2
      updated_at:
        type: string
    type: object
  internal_integrations.initiateOAuthResponse:
    properties:
      auth_url:
        type: string
      state:
        type: string
    type: object
  internal_integrations.oauthAppRequest:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
    type: object
  internal_ledger.HistoryEntry:
    properties:
      created_at:
        type: string
      id:
        type: integer
      impact:
        type: integer
      success:
        type: boolean
    type: object
  internal_notifications.Notification:
    properties:
      body:
        type: string
      created_at:
        type: string
      id:
        type: integer
      read:
        type: boolean
      title:
        type: string
      type:
        $ref: '#/definitions/internal_notifications.Type'
    type: object
  internal_notifications.Type:
    enum:
    - H2HI
    - OPPORTUNITY
    - HARVEST
    - SOUL_DRIFT
    type: string
    x-enum-comments:
      TypeH2HI: identity entropy spike — manual sync required
      TypeHarvest: ghost-agreement opportunity detected
      TypeOpportunity: high-value social debt detected by harvest engine
      TypeSoulDrift: periodic irrational-human injection event
    x-enum-descriptions:
    - identity entropy spike — manual sync required
    - high-value social debt detected by harvest engine
    - ghost-agreement opportunity detected
    - periodic irrational-human injection event
    x-enum-varnames:
    - TypeH2HI
    - TypeOpportunity
    - TypeHarvest
    - TypeSoulDrift
  internal_profile.ConnectionSetting:
    properties:
      api_endpoint:
        type: string
      kernel_name:
        type: string
      timezone:
        description: IANA timezone name e.g. "Europe/London", "UTC"
        type: string
    type: object
  internal_profile.DecisionPreference:
    properties:
      autonomy:
        description: Minimise dependence on third parties
        type: integer
      financial_growth:
        description: Prioritise revenue-generating decisions
        type: integer
      health_recovery:
        description: Respect sleep, stress and energy limits
        type: integer
      privacy_protection:
        description: Refuse data sharing with low-trust parties
        type: integer
      reputation_building:
        description: Long-term trust over short-term gain
        type: integer
      time_sovereignty:
        description: Weight given to protecting your time
        type: integer
    type: object
  internal_profile.EKProgress:
    properties:
      hand:
        type: boolean
      shadow:
        type: boolean
      voice:
        type: boolean
    type: object
  internal_profile.Profile:
    properties:
      api_endpoint:
        type: string
      created_at:
        type: string
      has_pin:
        type: boolean
      kernel_name:
        type: string
      preferences:
        $ref: '#/definitions/internal_profile.DecisionPreference'
      progress:
        $ref: '#/definitions/internal_profile.EKProgress'
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  internal_scheduler.Status:
    properties:
      interval_minutes:
        type: integer
      last_error:
        description: non-empty when last cycle failed
        type: string
      last_result:
        allOf:
        - $ref: '#/definitions/github_com_egokernel_ek1_internal_brain.PipelineResult'
        description: nil if never run
      last_run_at:
        description: nil if never run
        type: string
      last_signal_count:
        type: integer
      next_run_at:
        description: nil if not started
        type: string
      running:
        description: true while a pipeline cycle is executing
        type: boolean
      services:
        items:
          $ref: '#/definitions/github_com_egokernel_ek1_internal_datasync.ServiceStatus'
        type: array
    type: object
host: localhost:3000
info:
  contact: {}
  description: Personal AI agent — calendar, email, finance & negotiations.
  title: EK-1 Ego-Kernel API
  version: "1.0"
paths:
  /activities/events:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_activities.Event'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List events
      tags:
      - activities
  /activities/events/{id}:
    get:
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_activities.Event'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get event by ID
      tags:
      - activities
  /activities/events/{id}/read:
    put:
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_activities.Event'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Toggle read status
      tags:
      - activities
  /auth/session/lock:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Lock the screen session
      tags:
      - auth
  /auth/session/unlock:
    post:
      consumes:
      - application/json
      parameters:
      - description: SHA-256 hex of the PIN
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.unlockReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Too Many Requests
          schema:
            additionalProperties: true
            type: object
      summary: Unlock the screen session
      tags:
      - auth
  /biometrics/checkin:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_biometrics.CheckIn'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get current check-in
      tags:
      - biometrics
    put:
      consumes:
      - application/json
      parameters:
      - description: Check-in data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_biometrics.CheckIn'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_biometrics.CheckIn'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Update check-in
      tags:
      - biometrics
  /biometrics/checkin/history:
    get:
      description: Returns past check-ins newest first. Default limit is 7 (one week);
        maximum is 90.
      parameters:
      - description: Number of entries to return (1–90, default 7)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_biometrics.CheckIn'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Check-in history
      tags:
      - biometrics
  /brain/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_brain.StatusResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get brain status
      tags:
      - brain
  /brain/sync-acknowledge:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_brain.KernelSnapshot'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Acknowledge manual sync (clears H2HI)
      tags:
      - brain
  /chat:
    post:
      consumes:
      - application/json
      parameters:
      - description: Message and conversation history
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_chat.Request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_chat.Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Chat with your EK-1 kernel
      tags:
      - chat
  /chat/history:
    get:
      parameters:
      - description: Max messages to return (1–200, default 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_chat.Message'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get conversation history
      tags:
      - chat
  /chat/stream:
    post:
      consumes:
      - application/json
      description: 'Returns tokens as Server-Sent Events: {"token":"<chunk>"} until
        {"done":true,"timestamp":"..."}. Falls back to buffered JSON when streaming
        is unavailable.'
      parameters:
      - description: Message and conversation history
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_chat.Request'
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Stream chat with your EK-1 kernel (SSE)
      tags:
      - chat
  /harvest/results:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_harvest.HarvestResult'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get latest harvest results
      tags:
      - harvest
  /harvest/scan:
    post:
      description: Starts a social-debt scan in the background and returns immediately.
        Poll GET /harvest/results for the completed result or GET /harvest/status
        for running state.
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Trigger harvest scan (async)
      tags:
      - harvest
  /harvest/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get harvest scan status
      tags:
      - harvest
  /integrations/services:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_integrations.Service'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List all services
      tags:
      - integrations
  /integrations/services/{id}:
    get:
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_integrations.Service'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get service by ID
      tags:
      - integrations
