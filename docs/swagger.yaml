basePath: /
definitions:
  chat.Message:
    properties:
      content:
        type: string
      role:
        type: string
      timestamp:
        type: string
    type: object
  chat.Request:
    properties:
      history:
        items:
          $ref: '#/definitions/chat.Message'
        type: array
      message:
        type: string
    type: object
  chat.Response:
    properties:
      reply:
        type: string
      timestamp:
        type: string
    type: object
  github_com_egokernel_ek1_internal_ai.AnalysedSignal:
    properties:
      category:
        description: relevant|newsletter|automated|notification
        type: string
      event_type:
        allOf:
        - $ref: '#/definitions/github_com_egokernel_ek1_internal_ai.LegacyEventType'
        description: Use Category instead
      gain:
        allOf:
        - $ref: '#/definitions/github_com_egokernel_ek1_internal_ai.LegacyGain'
        description: Removed in simplified model
      importance:
        allOf:
        - $ref: '#/definitions/github_com_egokernel_ek1_internal_ai.LegacyImportance'
        description: Use Priority instead
      isRelevant:
        type: boolean
      narrative:
        description: 'Deprecated: Legacy fields for backward compatibility during
          transition'
        type: string
      needsReply:
        type: boolean
      priority:
        description: high|medium|low
        type: string
      reasoning:
        type: string
      replyDraft:
        type: string
      replyTone:
        type: string
      request:
        allOf:
        - $ref: '#/definitions/github_com_egokernel_ek1_internal_ai.LegacyRequest'
        description: Use new fields instead
      signal:
        $ref: '#/definitions/github_com_egokernel_ek1_internal_datasync.RawSignal'
      suggestedAction:
        type: string
      summary:
        type: string
    type: object
  github_com_egokernel_ek1_internal_ai.LegacyEventType:
    enum:
    - 0
    type: integer
    x-enum-varnames:
    - EventTypeOther
  github_com_egokernel_ek1_internal_ai.LegacyGain:
    properties:
      details:
        type: string
      kind:
        $ref: '#/definitions/github_com_egokernel_ek1_internal_ai.LegacyGainKind'
      symbol:
        type: string
      type:
        $ref: '#/definitions/github_com_egokernel_ek1_internal_ai.LegacyGainType'
      value:
        type: number
    type: object
  github_com_egokernel_ek1_internal_ai.LegacyGainKind:
    enum:
    - 0
    type: integer
    x-enum-varnames:
    - GainKindMoney
  github_com_egokernel_ek1_internal_ai.LegacyGainType:
    enum:
    - 0
    type: integer
    x-enum-varnames:
    - GainTypePositive
  github_com_egokernel_ek1_internal_ai.LegacyImportance:
    enum:
    - 0
    type: integer
    x-enum-varnames:
    - ImportanceLow
  github_com_egokernel_ek1_internal_ai.LegacyRequest:
    properties:
      description:
        type: string
      estimated_roi:
        type: number
      id:
        type: string
      manipulation_pct:
        type: number
      sender_id:
        type: string
      time_commitment:
        type: number
    type: object
  github_com_egokernel_ek1_internal_datasync.RawSignal:
    properties:
      body:
        type: string
      category:
        description: '"Calendar", "Communication", "Finance", "Health", "Billing"'
        type: string
      metadata:
        additionalProperties:
          type: string
        description: service-specific fields (sender, amount, channel, etc.)
        type: object
      occurredAt:
        type: string
      servicePurpose:
        description: what this service is and what it's used for (injected by engine)
        type: string
      serviceSlug:
        type: string
      title:
        type: string
    type: object
  github_com_egokernel_ek1_internal_datasync.ServiceStatus:
    properties:
      active:
        description: true while this adapter is being pulled right now
        type: boolean
      last_error:
        description: non-empty = last pull failed
        type: string
      last_sync_at:
        description: nil = never synced
        type: string
      signal_count:
        description: signals pulled in the last completed cycle
        type: integer
      slug:
        type: string
    type: object
  github_com_egokernel_ek1_internal_signals.ProcessResult:
    properties:
      ai_errors:
        type: integer
      errors:
        items:
          type: string
        type: array
      processed_ok:
        type: integer
      relevant_signals:
        type: integer
      replies_generated:
        type: integer
      store_errors:
        type: integer
      total_signals:
        type: integer
    type: object
  internal_auth.AuthTokenResponse:
    properties:
      expires_at:
        type: string
      token:
        type: string
    type: object
  internal_auth.ChangePinRequest:
    properties:
      current_pin:
        type: string
      new_pin:
        type: string
    type: object
  internal_auth.LoginRequest:
    properties:
      pin:
        type: string
    type: object
  internal_auth.PinStatusResponse:
    properties:
      configured:
        type: boolean
    type: object
  internal_auth.RemovePinRequest:
    properties:
      current_pin:
        type: string
    type: object
  internal_auth.SetupPinRequest:
    properties:
      pin:
        type: string
    type: object
  internal_auth.pinReq:
    properties:
      pin_hash:
        type: string
    type: object
  internal_auth.unlockReq:
    properties:
      pin_hash:
        type: string
    type: object
  internal_biometrics.CheckIn:
    properties:
      created_at:
        type: string
      energy:
        type: integer
      extra_context:
        type: string
      mood:
        type: integer
      sleep:
        type: number
      stress_level:
        type: integer
      updated_at:
        type: string
    type: object
  internal_integrations.AuthMethod:
    enum:
    - 0
    - 1
    type: integer
    x-enum-varnames:
    - APIKeyAuth
    - OAuth2Auth
  internal_integrations.ConnectInput:
    properties:
      api_key:
        type: string
      oauth_access_token:
        type: string
      oauth_refresh_token:
        type: string
    type: object
  internal_integrations.ConnectionStatus:
    enum:
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-comments:
      Connected: connected and active
      Disconnected: not installed
      NeedsReauth: connected before but token lacks required scopes — user must re-authorize
      Pending: credentials being entered
    x-enum-descriptions:
    - not installed
    - credentials being entered
    - connected and active
    - connected before but token lacks required scopes — user must re-authorize
    x-enum-varnames:
    - Disconnected
    - Pending
    - Connected
    - NeedsReauth
  internal_integrations.Service:
    properties:
      api_endpoint:
        type: string
      api_key:
        description: masked on read, never raw
        type: string
      app_configured:
        description: |-
          AppConfigured is true once the user has saved their OAuth client_id/secret (BYOA).
          false → show "Set Up OAuth App"; true + !OAuthConnected → show "Authorize"; true + OAuthConnected → show "Disconnect"
        type: boolean
      auth_method:
        allOf:
        - $ref: '#/definitions/internal_integrations.AuthMethod'
        enum:
        - 0
        - 1
      category:
        type: string
      color:
        description: brand hex color, e.g. "#4285F4"; empty for custom services
        type: string
      created_at:
        type: string
      custom:
        type: boolean
      description:
        type: string
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      oauth_connected:
        type: boolean
      slug:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/internal_integrations.ConnectionStatus'
        enum:
        - 0
        - 1
        - 2
        - 3
      updated_at:
        type: string
    type: object
  internal_integrations.initiateOAuthResponse:
    properties:
      auth_url:
        type: string
      state:
        type: string
    type: object
  internal_integrations.oauthAppRequest:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
    type: object
  internal_notifications.Notification:
    properties:
      body:
        type: string
      created_at:
        type: string
      id:
        type: integer
      read:
        type: boolean
      title:
        type: string
      type:
        $ref: '#/definitions/internal_notifications.Type'
    type: object
  internal_notifications.Type:
    enum:
    - H2HI
    - OPPORTUNITY
    - HARVEST
    - SOUL_DRIFT
    - QUEUE_ENTRY
    type: string
    x-enum-comments:
      TypeH2HI: identity entropy spike — manual sync required
      TypeHarvest: ghost-agreement opportunity detected
      TypeOpportunity: high-value social debt detected by harvest engine
      TypeQueueEntry: action queued for human approval (Stage 2)
      TypeSoulDrift: periodic irrational-human injection event
    x-enum-descriptions:
    - identity entropy spike — manual sync required
    - high-value social debt detected by harvest engine
    - ghost-agreement opportunity detected
    - periodic irrational-human injection event
    - action queued for human approval (Stage 2)
    x-enum-varnames:
    - TypeH2HI
    - TypeOpportunity
    - TypeHarvest
    - TypeSoulDrift
    - TypeQueueEntry
  internal_profile.ConnectionSetting:
    properties:
      api_endpoint:
        type: string
      kernel_name:
        type: string
      timezone:
        description: IANA timezone name e.g. "Europe/London", "UTC"
        type: string
    type: object
  internal_profile.DecisionPreference:
    properties:
      autonomy:
        description: Minimise dependence on third parties (1–10)
        type: integer
      base_hourly_rate:
        description: Your target USD value of one hour of attention (e.g. 50, 150,
          500)
        type: number
      financial_growth:
        description: Prioritise revenue-generating decisions (1–10)
        type: integer
      health_recovery:
        description: Respect sleep, stress and energy limits (1–10)
        type: integer
      privacy_protection:
        description: Refuse data sharing with low-trust parties (1–10)
        type: integer
      reputation_building:
        description: Long-term trust over short-term gain (1–10)
        type: integer
      time_sovereignty:
        description: Weight given to protecting your time (1–10)
        type: integer
    type: object
  internal_profile.EKProgress:
    properties:
      hand:
        type: boolean
      shadow:
        type: boolean
      voice:
        type: boolean
    type: object
  internal_profile.Profile:
    properties:
      api_endpoint:
        type: string
      created_at:
        type: string
      has_pin:
        type: boolean
      identity:
        $ref: '#/definitions/internal_profile.UserIdentity'
      kernel_name:
        type: string
      preferences:
        $ref: '#/definitions/internal_profile.DecisionPreference'
      progress:
        $ref: '#/definitions/internal_profile.EKProgress'
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  internal_profile.UserIdentity:
    properties:
      current_goals:
        description: e.g. "close Q1 enterprise deals"
        type: string
      income_model:
        description: e.g. "salary + consulting"
        type: string
      industry:
        description: e.g. "Software / SaaS"
        type: string
      inferred_summary:
        description: auto-generated by POST /profile/infer
        type: string
      profession:
        description: e.g. "Senior Product Manager, B2B SaaS"
        type: string
      signal_priorities:
        description: e.g. "client requests, investor pings"
        type: string
      skills:
        description: e.g. "product strategy, pricing, hiring"
        type: string
    type: object
  internal_scheduler.Status:
    properties:
      interval_minutes:
        type: integer
      last_error:
        description: non-empty when last cycle failed
        type: string
      last_result:
        allOf:
        - $ref: '#/definitions/github_com_egokernel_ek1_internal_signals.ProcessResult'
        description: nil if never run
      last_run_at:
        description: nil if never run
        type: string
      last_signal_count:
        type: integer
      next_run_at:
        description: nil if not started
        type: string
      running:
        description: true while a pipeline cycle is executing
        type: boolean
      services:
        items:
          $ref: '#/definitions/github_com_egokernel_ek1_internal_datasync.ServiceStatus'
        type: array
    type: object
  internal_signals.DraftReply:
    properties:
      created_at:
        type: string
      edited_text:
        description: User-modified version
        type: string
      id:
        type: integer
      original_text:
        description: AI-generated draft
        type: string
      recipients:
        description: email addresses
        items:
          type: string
        type: array
      signal_id:
        type: integer
      status:
        $ref: '#/definitions/internal_signals.ReplyStatus'
      subject:
        description: reply subject line
        type: string
      tone:
        description: professional, casual, friendly, formal
        type: string
      updated_at:
        type: string
    type: object
  internal_signals.ReplyStatus:
    enum:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    type: integer
    x-enum-comments:
      ReplyApproved: User approved, ready to send
      ReplyDrafted: Reply generated, waiting for user
      ReplyEdited: User modified the draft
      ReplyNone: No reply needed/generated
      ReplyRejected: User rejected the draft
      ReplySent: Reply was sent
    x-enum-descriptions:
    - No reply needed/generated
    - Reply generated, waiting for user
    - User modified the draft
    - User approved, ready to send
    - User rejected the draft
    - Reply was sent
    x-enum-varnames:
    - ReplyNone
    - ReplyDrafted
    - ReplyEdited
    - ReplyApproved
    - ReplyRejected
    - ReplySent
  internal_signals.Signal:
    properties:
      analysis:
        $ref: '#/definitions/github_com_egokernel_ek1_internal_ai.AnalysedSignal'
      id:
        type: integer
      last_updated:
        type: string
      original_signal:
        $ref: '#/definitions/github_com_egokernel_ek1_internal_datasync.RawSignal'
      processed_at:
        type: string
      reply_status:
        $ref: '#/definitions/internal_signals.ReplyStatus'
      service_slug:
        type: string
      status:
        $ref: '#/definitions/internal_signals.Status'
      user_notes:
        type: string
    type: object
  internal_signals.SignalSummary:
    properties:
      high_priority:
        type: integer
      needing_replies:
        type: integer
      newsletters_today:
        type: integer
      relevant_today:
        type: integer
      total_pending:
        type: integer
    type: object
  internal_signals.Status:
    enum:
    - 0
    - 1
    - 2
    - 3
    type: integer
    x-enum-comments:
      StatusDone: User marked as completed
      StatusIgnored: User marked as not important
      StatusPending: Waiting for user review
      StatusSnoozed: User postponed until later
    x-enum-descriptions:
    - Waiting for user review
    - User marked as completed
    - User marked as not important
    - User postponed until later
    x-enum-varnames:
    - StatusPending
    - StatusDone
    - StatusIgnored
    - StatusSnoozed
  internal_signals.UpdateReplyRequest:
    properties:
      action:
        description: approve|reject|edit
        type: string
      edited_text:
        description: modified reply text (for edit action)
        type: string
    type: object
  internal_signals.UpdateStatusRequest:
    properties:
      notes:
        description: optional user notes
        type: string
      status:
        description: pending|done|ignored|snoozed
        type: string
    type: object
host: localhost:3000
info:
  contact: {}
  description: Personal AI agent — calendar, email, finance & negotiations.
  title: EK-1 Ego-Kernel API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Validates PIN and returns JWT token
      parameters:
      - description: Login request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthTokenResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: Too Many Requests
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login with PIN
      tags:
      - auth
  /auth/logout:
    post:
      description: Invalidates the current JWT token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /auth/pin:
    delete:
      consumes:
      - application/json
      description: Removes PIN protection after verification, ends session
      parameters:
      - description: PIN removal request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.RemovePinRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove PIN
      tags:
      - auth
  /auth/pin/change:
    post:
      consumes:
      - application/json
      description: Changes the PIN after verifying current PIN, issues new JWT
      parameters:
      - description: PIN change request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.ChangePinRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthTokenResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Change PIN
      tags:
      - auth
  /auth/pin/setup:
    post:
      consumes:
      - application/json
      description: Sets up the PIN for first-time use (only if no PIN is configured)
      parameters:
      - description: PIN setup request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.SetupPinRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.AuthTokenResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Setup initial PIN
      tags:
      - auth
  /auth/pin/status:
    get:
      description: Returns whether a PIN has been configured for this device
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_auth.PinStatusResponse'
      summary: Check PIN configuration status
      tags:
      - auth
  /auth/session/lock:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Lock the screen session
      tags:
      - auth
  /auth/session/unlock:
    post:
      consumes:
      - application/json
      parameters:
      - description: SHA-256 hex of the PIN
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_auth.unlockReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Too Many Requests
          schema:
            additionalProperties: true
            type: object
      summary: Unlock the screen session
      tags:
      - auth
  /biometrics/checkin:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_biometrics.CheckIn'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get current check-in
      tags:
      - biometrics
    put:
      consumes:
      - application/json
      parameters:
      - description: Check-in data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_biometrics.CheckIn'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_biometrics.CheckIn'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Update check-in
      tags:
      - biometrics
  /biometrics/checkin/history:
    get:
      description: Returns past check-ins newest first. Default limit is 7 (one week);
        maximum is 90.
      parameters:
      - description: Number of entries to return (1–90, default 7)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_biometrics.CheckIn'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Check-in history
      tags:
      - biometrics
  /chat:
    post:
      consumes:
      - application/json
      parameters:
      - description: Message and conversation history
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chat.Request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Chat with your EK-1 kernel
      tags:
      - chat
  /chat/history:
    get:
      parameters:
      - description: Max messages to return (1–200, default 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/chat.Message'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Get conversation history
      tags:
      - chat
  /chat/stream:
    post:
      consumes:
      - application/json
      description: 'Returns tokens as Server-Sent Events: {"token":"<chunk>"} until
        {"done":true,"timestamp":"..."}. Falls back to buffered JSON when streaming
        is unavailable.'
      parameters:
      - description: Message and conversation history
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chat.Request'
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Stream chat with your EK-1 kernel (SSE)
      tags:
      - chat
  /integrations/services:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_integrations.Service'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: List all services
      tags:
      - integrations
  /integrations/services/{id}:
    get:
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
