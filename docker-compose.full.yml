name: sovereign-privacy-gateway

# Unified configuration - all services included by default
services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-gateway}
      - POSTGRES_USER=${DB_USER:-gateway}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-gateway_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gateway} -d ${DB_NAME:-gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ── Main Privacy Gateway ──────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${GATEWAY_TARGET:-development}
    environment:
      - PORT=8080
      - DASHBOARD_PORT=8081
      - DATABASE_PATH=/data/gateway.db
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - STRICT_MODE=${STRICT_MODE:-false}
      - RETENTION_DAYS=${RETENTION_DAYS:-30}
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-100}
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Database configuration
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-gateway}
      - DB_USER=${DB_USER:-gateway}
      - DB_PASSWORD=${DB_PASSWORD:-gateway_password}
      - DB_SSL_MODE=disable
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-your-super-secret-session-key}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - gateway-data:/data
      - gateway-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Monitoring: Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.external-url=http://localhost/prometheus/'
      - '--web.route-prefix=/'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Monitoring: Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel,grafana-simple-json-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_DOMAIN=localhost
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Alerting ───────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost/alertmanager/'
      - '--web.route-prefix=/'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Log Management ─────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    volumes:
      - loki-data:/loki
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Log Collection ─────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    volumes:
      - gateway-logs:/var/log/gateway:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki

  # ── Database Backup ────────────────────────────────────────────────────────
  backup:
    image: postgres:15-alpine
    volumes:
      - backup-storage:/backups
    environment:
      - PGHOST=postgres
      - PGDATABASE=${DB_NAME:-gateway}
      - PGUSER=${DB_USER:-gateway}
      - PGPASSWORD=${DB_PASSWORD:-gateway_password}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    command: >
      sh -c "
        while true; do
          echo 'Starting backup...' &&
          timestamp=$$(date +%Y%m%d_%H%M%S) &&
          pg_dump > /backups/gateway_backup_$${timestamp}.sql &&
          echo 'Backup completed: gateway_backup_'$${timestamp}'.sql' &&
          find /backups -name 'gateway_backup_*.sql' -mtime +${BACKUP_RETENTION_DAYS:-7} -delete &&
          echo 'Old backups cleaned up' &&
          sleep 86400
        done
      "
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - gateway-logs:/var/log/nginx
    depends_on:
      - gateway
      - prometheus
      - grafana
      - alertmanager
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Persistent Storage ─────────────────────────────────────────────────────────
volumes:
  gateway-data:
  gateway-logs:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  loki-data:
  backup-storage:
