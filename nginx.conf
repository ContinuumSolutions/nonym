server {
    listen 80;

    # ── EK-1 API ─────────────────────────────────────────────────────────────
    # All known API path prefixes are forwarded to the backend.
    # The SPA uses a relative API_BASE_URL (""), so every fetch goes to the
    # same origin (this nginx), which proxies it here — no mixed-content,
    # no CORS, no Docker-internal hostname exposed to the browser.
    location ~ ^/(health|swagger|brain|activities|biometrics|chat|integrations|ledger|notifications|harvest|scheduler|profile) {
        proxy_pass         http://ek1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s; # accommodate long sync/harvest runs
    }

    # ── Dashboard SPA ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://dashboard:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
