# map runs in the http context (this file is included inside nginx's http block).
# Reflects the request Origin back only when it matches genesis.egokernel.com
# on any port. Non-matching origins get an empty string → no header added.
map $http_origin $cors_origin {
    default "";
    "~^https?://genesis\.egokernel\.com(:[0-9]+)?$" $http_origin;
}

server {
    listen 80;

    # ── EK-1 API ─────────────────────────────────────────────────────────────
    location ~ ^/(health|swagger|brain|activities|biometrics|chat|integrations|ledger|notifications|harvest|scheduler|profile) {

        # Preflight — answered by nginx; never hits the backend
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;
            add_header Access-Control-Max-Age       86400 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;

        proxy_pass         http://ek1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Dashboard SPA ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://dashboard:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
