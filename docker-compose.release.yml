# docker-compose.release.yml — for end-user distribution (uses pre-built images).
# Developers: use docker-compose.yml (builds from source).

name: ek1

services:

  # ── Ollama LLM ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # Pull the model once on first start, then exits.
  ollama-pull:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: pull ${OLLAMA_MODEL:-llama3.2}
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── EK-1 Ego-Kernel ────────────────────────────────────────────────────────
  ek1:
    image: egokernel/ek1:latest
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ek1-data:/data
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── EK-1 Dashboard (frontend) ───────────────────────────────────────────────
  dashboard:
    image: egokernel/ek1-dashboard:latest
    environment:
      API_BASE_URL: ""
    depends_on:
      - ek1
    restart: unless-stopped

  # ── Reverse proxy ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ek1
      - dashboard
    restart: unless-stopped

volumes:
  ollama-models:   # Ollama model weights — persisted across restarts
  ek1-data:        # SQLite database (ek1.db) — persisted across restarts
