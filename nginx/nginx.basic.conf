worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=gateway:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=5r/s;

    # Upstream definitions (basic services only)
    upstream gateway {
        server gateway:8080;
        keepalive 32;
    }

    upstream dashboard {
        server gateway:8081;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        server_tokens off;

        # Client settings
        client_max_body_size 10M;
        client_header_timeout 30s;
        client_body_timeout 30s;
        send_timeout 30s;

        # Health check (bypass rate limiting)
        location = /health {
            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Privacy Gateway API
        location ~ ^/(v1|api)/ {
            limit_req zone=gateway burst=20 nodelay;

            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300;
            proxy_connect_timeout 10;

            # CORS headers
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        }

        # Gateway status endpoints
        location ~ ^/gateway/(status|stats)$ {
            limit_req zone=dashboard burst=10 nodelay;

            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Monitoring service placeholders (return 503 when not available)
        location /grafana/ {
            return 503 "Monitoring services not available. Start with --profile monitoring to enable.";
            add_header Content-Type text/plain always;
        }

        location /prometheus/ {
            return 503 "Monitoring services not available. Start with --profile monitoring to enable.";
            add_header Content-Type text/plain always;
        }

        location /alertmanager/ {
            return 503 "Monitoring services not available. Start with --profile monitoring to enable.";
            add_header Content-Type text/plain always;
        }

        # Convenience redirects
        location = /monitoring {
            return 301 /grafana/;
        }

        location = /monitoring/ {
            return 301 /grafana/;
        }

        location = /metrics {
            return 301 /prometheus/;
        }

        location = /alerts {
            return 301 /alertmanager/;
        }

        # Privacy Gateway Dashboard (main interface)
        location / {
            limit_req zone=dashboard burst=15 nodelay;

            proxy_pass http://dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for real-time updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Static assets caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://dashboard;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Block access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
        }

        location ~ \.(env|log|sql|db)$ {
            deny all;
            access_log off;
        }
    }

    # Connection upgrade mapping for WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
