name: ek1

# Complete Privacy Protection Stack
services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-gateway}
      - POSTGRES_USER=${DB_USER:-gateway}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-gateway_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gateway} -d ${DB_NAME:-gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Session Storage ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - backend

  # ── Privacy Gateway ────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${GATEWAY_TARGET:-development}
    environment:
      - PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - STRICT_MODE=${STRICT_MODE:-false}
      # API Keys for AI providers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-gateway}
      - DB_USER=${DB_USER:-gateway}
      - DB_PASSWORD=${DB_PASSWORD:-gateway_password}
      - DB_SSL_MODE=disable
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-change-in-production}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - gateway-data:/data
      - gateway-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.unified.conf:/etc/nginx/nginx.conf:ro
      - ./api-docs:/usr/share/nginx/html/api-docs:ro
    depends_on:
      - gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend
      - backend

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ── Storage ────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  gateway-data:
  gateway-logs:
