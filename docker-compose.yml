version: '3.8'

name: sovereign-privacy-gateway

# Development Configuration for Sovereign Privacy Gateway
services:

  # ── Main Privacy Gateway ──────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "8080:8080"   # Main privacy gateway endpoint
      - "8081:8081"   # Dashboard interface
    environment:
      - PORT=8080
      - DASHBOARD_PORT=8081
      - DATABASE_PATH=/data/gateway.db
      - LOG_LEVEL=debug
      - STRICT_MODE=false
      # Add your API keys via .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - .:/app
      - gateway-data:/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - default

  # ── Reverse Proxy (Optional) ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
    profiles: ["proxy"]

volumes:
  gateway-data:
    driver: local

networks:
  default:
    driver: bridge
