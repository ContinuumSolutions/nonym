version: '3.8'

name: sovereign-privacy-gateway

# Development Configuration for Sovereign Privacy Gateway
services:

  # ── Main Privacy Gateway ──────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "8080:8080"   # Main privacy gateway endpoint
      - "8081:8081"   # Dashboard interface
    environment:
      - PORT=8080
      - DASHBOARD_PORT=8081
      - DATABASE_PATH=/data/gateway.db
      - LOG_LEVEL=debug
      - LOCAL_LLM_URL=http://ollama:11434
      - STRICT_MODE=false
    volumes:
      - .:/app
      - gateway-data:/data
      - ./logs:/app/logs
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - default

  # ── Local LLM (Ollama) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - default

  # Pull default model on startup
  ollama-setup:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: >
      sh -c "
        echo 'Waiting for Ollama service...' &&
        sleep 30 &&
        ollama pull llama3.2:1b &&
        echo 'Model downloaded successfully'
      "
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    networks:
      - default

  # ── Reverse Proxy ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
    profiles: ["proxy"]

volumes:
  gateway-data:
    driver: local
  ollama-models:
    driver: local

networks:
  default:
    driver: bridge
