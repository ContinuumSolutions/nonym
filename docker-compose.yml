name: ek1

# Complete Privacy Protection Stack
services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-gateway}
      - POSTGRES_USER=${DB_USER:-gateway}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-gateway_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gateway} -d ${DB_NAME:-gateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Session Storage ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - backend

  # ── ML NER Service (GLiNER via gRPC) ───────────────────────────────────────
  ner-ml:
    build:
      context: .
      dockerfile: python-ner/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - GLINER_MODEL=${GLINER_MODEL:-urchade/gliner_medium-v2.1}
      - NER_GRPC_PORT=50051
      - NER_MAX_WORKERS=${NER_MAX_WORKERS:-4}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import grpc; ch=grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)\" && echo ok"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - backend

  # ── Privacy Gateway ────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${GATEWAY_TARGET:-development}
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - STRICT_MODE=${STRICT_MODE:-false}
      # Database
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-gateway}
      - DB_USER=${DB_USER:-gateway}
      - DB_PASSWORD=${DB_PASSWORD:-gateway_password}
      - DB_SSL_MODE=disable
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-change-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-change-in-production}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # ML NER gRPC backend
      - NER_GRPC_HOST=ner-ml
      - NER_GRPC_PORT=50051
    volumes:
      - gateway-data:/data
      - gateway-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ner-ml:
        condition: service_healthy
    networks:
      - backend

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge

# ── Storage ────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  gateway-data:
  gateway-logs:
