name: CI

on:
  push:
    branches: ["main", "alpha-*"]
  pull_request:
    branches: ["main"]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        # Reads the `go` directive from go.mod — never goes stale
        go-version-file: go.mod

    - name: Verify modules
      run: go mod verify

    - name: Build
      run: go build -v ./...

    - name: Vet
      run: go vet ./...

    - name: Test
      run: go test -v -race -count=1 ./...
