              schema:
                $ref: '#/components/schemas/Error'

  # Benchmarks
  /api/v1/benchmarks:
    get:
      tags: [Benchmarks]
      summary: Get published latency benchmarks
      description: |
        Returns pre-measured P50/P95/P99 latency benchmarks for the Nonym NER pipeline
        and proxy layer, addressing latency concerns proactively.

        **Key finding**: Nonym adds < 40 ms at P99. Upstream AI provider latency
        (typically 300–2,000 ms) dominates end-to-end response time.

        If transactions exist in the last hour, `live_stats` is populated with the
        real average processing time observed in this deployment.

        This endpoint is public — no authentication required.
      responses:
        '200':
          description: Benchmark report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BenchmarkReport'
              example:
                generated_at: "2026-03-21T12:00:00Z"
                environment: "4 vCPU / 8 GB RAM — Linux amd64"
                go_version: "go1.22"
                methodology: "Benchmarks measured using `go test -bench -benchmem`..."
                results:
                  - label: "NER scan — short prompt (< 500 tokens)"
                    p50_ms: 3.2
                    p95_ms: 7.8
                    p99_ms: 12.4
                    throughput: "> 3,000 req/s"
                    description: "Regex-only path. Covers EMAIL, PHONE, SSN, CREDIT_CARD, IP_ADDRESS."

