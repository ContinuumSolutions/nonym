  /gateway/auth-test:
    get:
      tags: [Health]
      summary: Authentication test endpoint
      description: Test endpoint for authentication functionality
      responses:
        '200':
          description: Authentication test result
          content:
            application/json:
              schema:
                type: object

  # AI Provider Proxy Endpoints
  /v1/chat/completions:
    post:
      tags: [Proxy]
      summary: Chat completions proxy
      description: |
        Drop-in replacement for OpenAI-compatible chat completions endpoints.
        Nonym strips PII from the request before forwarding it to the upstream provider,
        then returns the provider's response unchanged.

        **Two keys, two headers — do not confuse them:**

        | Header | Value | Purpose |
        |--------|-------|---------|
        | `X-API-Key` | Your Nonym API key | Authenticates your app with the Nonym gateway |
        | `Authorization` | `Bearer <provider_key>` | Your provider key (OpenAI, Anthropic, etc.) — passed through as-is, never stored by Nonym |

        Point your existing OpenAI SDK at the Nonym gateway URL and add `X-API-Key`.
        No other changes are needed.
      security:
        - apiKeyAuth: []
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer sk-..."
          description: |
            Your AI provider API key in `Bearer <key>` format.
            Nonym forwards this header unchanged to the upstream provider.
            It is never logged or stored.
        - in: header
          name: X-Nonym-Vendor
          required: false
          schema:
            type: string
            example: "openai"
          description: Optional vendor tag for audit attribution (set automatically by `@nonym/*` SDKs).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: OpenAI-compatible chat completion request
              example:
                model: "gpt-4o"
                messages:
                  - role: "user"
                    content: "Summarise this support ticket for user John Smith."
      responses:
        '200':
          description: Provider response returned unchanged after PII has been stripped from the request.
          content:
            application/json:
              schema:
                type: object
                description: OpenAI-compatible response
        '401':
          description: Missing or invalid Nonym API key (`X-API-Key`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/completions:
    post:
      tags: [Proxy]
      summary: Completions proxy
      description: |
        Legacy text completions proxy. Provider key is passed in `Authorization: Bearer <key>`;
        Nonym API key in `X-API-Key`. See `/v1/chat/completions` for full header details.
      security:
        - apiKeyAuth: []
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Provider API key (`Bearer <key>`). Forwarded unchanged, never stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Completion response
        '401':
          description: Missing or invalid Nonym API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/embeddings:
    post:
      tags: [Proxy]
      summary: Embeddings proxy
      description: |
        Embeddings proxy. Provider key is passed in `Authorization: Bearer <key>`;
        Nonym API key in `X-API-Key`. See `/v1/chat/completions` for full header details.
      security:
        - apiKeyAuth: []
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Provider API key (`Bearer <key>`). Forwarded unchanged, never stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Embeddings response
        '401':
          description: Missing or invalid Nonym API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/models:
    get:
      tags: [Proxy]
      summary: List models proxy
      description: |
        Lists models available from the configured upstream provider.
        Provider key in `Authorization: Bearer <key>`; Nonym API key in `X-API-Key`.
      security:
        - apiKeyAuth: []
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
          description: Provider API key (`Bearer <key>`). Forwarded unchanged, never stored.
      responses:
        '200':
          description: List of available models from the upstream provider
        '401':
          description: Missing or invalid Nonym API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Your **Nonym** API key — authenticates your application with the Nonym gateway.
        This is NOT the provider key (OpenAI, Anthropic, etc.).
        Provider keys are passed directly in the `Authorization` header of each request
        and are forwarded unchanged to the upstream provider after PII is stripped.

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    # Authentication schemas
    RegisterRequest:
      type: object
      description: |
        User registration request. Supports two name formats:
        1. Single name field: `name: "John Doe"` (will be split into first/last)
        2. Separate fields: `first_name: "John", last_name: "Doe"`
        At least one name format must be provided.
      properties:
        email:
          type: string
          format: email
          description: User's email address
        password:
          type: string
          minLength: 8
          description: User's password (minimum 8 characters)
        name:
          type: string
          description: Full name (e.g., "John Doe") - alternative to first_name/last_name
        first_name:
          type: string
          description: First name (when using separate name fields)
        last_name:
          type: string
          description: Last name (when using separate name fields)
        organization:
          type: string
          description: Organization name (creates new org if not joining existing)
        organization_id:
          type: string
          format: uuid
          description: UUID of existing organization to join
        invite_code:
          type: string
          description: Invitation code for joining organization
      required:
        - email
        - password
      oneOf:
        - required: [name]
        - required: [first_name, last_name]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
        password:
          type: string
          description: User's password
        organization_id:
          type: string
          format: uuid
          description: Optional organization UUID for multi-org users
      required:
        - email
        - password

    LoginResponse:
      type: object
      description: |
        Returned by login and by the MFA challenge endpoint.
        When `mfa_required` is true the token fields are absent; use `mfa_token` with `/auth/2fa/challenge`.
      properties:
        token:
          type: string
          description: Full session JWT (absent when mfa_required is true)
        expires_at:
          type: string
          format: date-time
          description: When the session token expires
        user:
          $ref: '#/components/schemas/UserProfile'
        organization:
          $ref: '#/components/schemas/Organization'
        mfa_required:
          type: boolean
          description: True when the account has 2FA enabled and a challenge is needed
        mfa_token:
          type: string
          description: Short-lived JWT (15 min) to complete the MFA challenge
        mfa_token_expires_at:
          type: string
          format: date-time
          description: Expiry of the MFA challenge token

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: User's unique identifier (UUID)
        email:
          type: string
          format: email
          description: User's email address
        first_name:
          type: string
          description: User's first name
        last_name:
          type: string
          description: User's last name
        full_name:
          type: string
          description: User's full name (computed from first_name + last_name)
        role:
          type: string
          enum: [owner, admin, user, viewer]
          description: User's role in the organization
        organization_id:
          type: string
          format: uuid
          description: Organization UUID this user belongs to
        is_active:
          type: boolean
          description: Whether the user account is active
        email_verified:
          type: boolean
          description: Whether the user's email is verified
        created_at:
          type: string
          format: date-time
          description: When the user account was created
        updated_at:
          type: string
          format: date-time
          description: When the user account was last updated
        last_login:
          type: string
          format: date-time
          nullable: true
          description: When the user last logged in
        organization:
          $ref: '#/components/schemas/Organization'

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: User's unique identifier (UUID)
        email:
          type: string
          format: email
          description: User's email address
        first_name:
          type: string
          description: User's first name
        last_name:
          type: string
          description: User's last name
        full_name:
          type: string
          description: User's full name (computed from first_name + last_name)
        role:
          type: string
          enum: [owner, admin, user, viewer]
          description: User's role in the organization
        organization_id:
          type: string
          format: uuid
          description: Organization UUID this user belongs to
        is_active:
          type: boolean
          description: Whether the user account is active
        email_verified:
          type: boolean
          description: Whether the user's email is verified
        two_fa_enabled:
          type: boolean
          description: Whether TOTP two-factor authentication is active for this user
        created_at:
          type: string
          format: date-time
          description: When the user account was created
        last_login:
          type: string
          format: date-time
          nullable: true
          description: When the user last logged in
        organization:
          $ref: '#/components/schemas/Organization'

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Organization's unique identifier (UUID)
        name:
          type: string
          description: Organization name
        slug:
          type: string
          description: URL-friendly organization identifier
        description:
          type: string
          description: Organization description
        owner_id:
          type: string
          format: uuid
          description: UUID of the organization owner
        is_active:
          type: boolean
          description: Whether the organization is active
        created_at:
          type: string
          format: date-time
          description: When the organization was created
        updated_at:
          type: string
          format: date-time
          description: When the organization was last updated

    OrganizationUpdateRequest:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        size:
          type: string
        country:
          type: string
        description:
          type: string

    # API Key schemas
    APIKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        masked_key:
          type: string
        permissions:
          type: string
        user_id:
          type: string
          format: uuid
          description: User UUID who owns this API key
        organization_id:
          type: string
          format: uuid
          description: Organization UUID this API key belongs to
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        status:
          type: string
        last_used:
          type: string
          format: date-time

    APIKeyCreateRequest:
      type: object
      properties:
        name:
          type: string
        permissions:
          type: string
          enum: [read, write, admin]
        expiryDate:
          type: string
          format: date
      required:
        - name
        - permissions

    APIKeyCreateResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        api_key:
          type: string
          description: Only returned once upon creation
        masked_key:
          type: string
        expires_at:
          type: string
          format: date-time

    # Team management schemas
    TeamMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Team member's unique identifier (UUID)
        first_name:
          type: string
          description: Team member's first name
        last_name:
          type: string
          description: Team member's last name
        full_name:
          type: string
          description: Team member's full name
        email:
          type: string
          format: email
          description: Team member's email address
        role:
          type: string
          enum: [owner, admin, user, viewer]
          description: Team member's role in the organization
        is_active:
          type: boolean
          description: Whether the team member is active
        joined_at:
          type: string
          format: date-time
          description: When the team member joined
        last_active:
          type: string
          format: date-time
          nullable: true
          description: When the team member was last active

    TeamInviteRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
      required:
        - email
        - role

    # Analytics schemas
    Transaction:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        status:
          type: string
        provider:
          type: string
        status_code:
          type: integer
        processing_time:
          type: number
        redaction_count:
          type: integer
        redaction_details:
          type: array
          items:
            $ref: '#/components/schemas/RedactionDetail'
        client_ip:
          type: string
        user_agent:
          type: string
        error_message:
          type: string
        organization_id:
          type: string
          format: uuid
          description: Organization UUID
        user_id:
          type: string
          format: uuid
          description: User UUID
        vendor_name:
          type: string
          description: Vendor attributed to this request (e.g. "sentry", "datadog")

    RedactionDetail:
      type: object
      properties:
        type:
          type: string
        original_value:
          type: string
        token:
          type: string
        position:
          type: integer

    ProviderStats:
      type: object
      properties:
        provider:
          type: string
        requests:
          type: integer
        percent:
          type: number

    ActivityPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        count:
          type: integer

    StatisticsResponse:
      type: object
      properties:
        pii_protected:
          type: integer
        total_requests:
          type: integer
        blocked_requests:
          type: integer
        redacted_requests:
          type: integer
        success_rate:
          type: number
        avg_processing_time:
          type: number
        top_providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderStats'
        recent_activity:
          type: array
          items:
            $ref: '#/components/schemas/ActivityPoint'

    # Protection schemas
    ProtectionEvent:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        type:
          type: string
        action:
          type: string
        provider:
          type: string
        model:
          type: string
        status:
          type: string
        protection:
          type: string
        redaction_count:
          type: integer
        redaction_details:
          type: array
          items:
            $ref: '#/components/schemas/RedactionDetail'
        processing_time:
          type: number
        severity:
          type: string
        client_ip:
          type: string
        user_agent:
          type: string
        metadata:
          type: object
        compliance_frameworks:
          type: array
          description: |
            Regulatory frameworks applicable to this event based on detected entity types.
            Computed server-side at write time — do not re-derive client-side.
          items:
            type: string
            enum: [GDPR, HIPAA, PCI-DSS, SOC2]
          example: ["GDPR", "HIPAA", "SOC2"]

    ProtectionEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/ProtectionEvent'
        total:
          type: integer
        has_more:
          type: boolean
        limit:
          type: integer
        offset:
          type: integer

    ProtectionStatsResponse:
      type: object
      properties:
        protectedToday:
          type: integer
        blockedToday:
          type: integer
        detectionRate:
          type: number
        highRisk:
          type: integer
        totalEvents:
          type: integer
        lastUpdate:
          type: string
          format: date-time

    # Compliance schemas
    FineRate:
      type: object
      properties:
        framework:
          type: string
          enum: [GDPR, HIPAA, PCI-DSS]
          description: Regulatory framework name
        per_event_amount:
          type: number
          description: Estimated fine exposure per event (in `currency`)
          example: 20000
        currency:
          type: string
          description: ISO 4217 currency code
          example: EUR
      required: [framework, per_event_amount, currency]

    ComplianceSettingsResponse:
      type: object
      properties:
        fine_rates:
          type: array
          items:
            $ref: '#/components/schemas/FineRate'
        disclaimer:
          type: string
          description: Legal disclaimer — always present
          example: "These estimates are for internal risk awareness only and do not constitute legal advice."

    ComplianceSettingsUpdateRequest:
      type: object
      properties:
        fine_rates:
          type: array
          description: Partial list — only included frameworks are updated
          items:
            $ref: '#/components/schemas/FineRate'
      required: [fine_rates]

    ExposureEstimate:
      type: object
      nullable: true
      description: Estimated fine exposure averted. Null for SOC2 (no statutory fine).
      properties:
        amount:
          type: number
          description: Total estimated exposure (events_protected × per_event_basis)
          example: 640000
        currency:
          type: string
          example: EUR
        per_event_basis:
          type: number
          description: Per-event rate used for calculation
          example: 20000
        disclaimer:
          type: string
          enum: [estimate]
          description: Always "estimate" — these are not legally binding figures

    FrameworkSummary:
      type: object
      properties:
        key:
          type: string
          enum: [GDPR, HIPAA, PCI-DSS, SOC2]
        label:
          type: string
        events_protected:
          type: integer
          description: Number of distinct events tagged with this framework
        redactions:
          type: integer
          description: Total redactions across events tagged with this framework
        top_entity_types:
          type: array
          description: Up to 3 most-frequent entity types contributing to this framework
          items:
            type: string
          example: ["PERSON", "EMAIL", "ADDRESS"]
        citation:
          type: string
          description: Primary regulatory citation
          example: "Art. 5(1)(c) · Data Minimisation"
        estimated_exposure_averted:
          $ref: '#/components/schemas/ExposureEstimate'

    ComplianceSummaryResponse:
      type: object
      properties:
        time_range:
          type: string
          enum: [1h, 24h, 7d, 30d]
        generated_at:
          type: string
          format: date-time
        frameworks:
          type: array
          items:
            $ref: '#/components/schemas/FrameworkSummary'
        total_estimated_exposure_averted_usd:
          type: number
          description: |
            Sum of all non-null framework exposures converted to USD.
            EUR amounts are converted at a fixed 1.08 rate.
          example: 826200

    # Two-Factor Authentication schemas
    TOTPSetupBeginRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: User's current password (required to initiate setup)

    TOTPSetupBeginResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
          description: Temporary setup session ID — pass to /setup/verify
        secret:
          type: string
          description: Base32-encoded TOTP secret for manual entry in authenticator app
          example: JBSWY3DPEHPK3PXP
        otpauth_uri:
          type: string
          description: OTPAuth URI — pass to a QR code library to render the setup QR code
          example: "otpauth://totp/Nonym:user@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Nonym&algorithm=SHA1&digits=6&period=30"
        expires_at:
          type: string
          format: date-time
          description: When the setup session expires (10 minutes from creation)

    TOTPSetupVerifyRequest:
      type: object
      required: [session_id, totp_code]
      properties:
        session_id:
          type: string
          format: uuid
          description: Session ID returned by /setup/begin
        totp_code:
          type: string
          description: 6-digit TOTP code from the authenticator app
          example: "123456"

    TOTPSetupVerifyResponse:
      type: object
      properties:
        backup_codes:
          type: array
          description: 8 single-use backup codes — shown only once, store securely
          items:
            type: string
          example:
            - "a3bk-p7mw"
            - "r9cx-t4nh"
            - "q6jv-s2fy"
            - "w8nm-h5j3"
            - "k4ts-b7rp"
            - "m2wq-f8cx"
            - "n7hv-k3sq"
            - "j5pb-r6tn"

    TOTPDisableRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: User's current password (required to disable 2FA)

    TOTPStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether TOTP 2FA is currently active
        verified_at:
          type: string
          format: date-time
          nullable: true
          description: When 2FA was first successfully verified (null if not enabled)
        backup_codes_remaining:
          type: integer
          description: Number of unused backup codes remaining

    TOTPRegenerateRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: User's current password (required to regenerate backup codes)

    TOTPRegenerateResponse:
      type: object
      properties:
        backup_codes:
          type: array
          description: 8 fresh single-use backup codes — previous codes are invalidated
          items:
            type: string

    TOTPChallengeRequest:
      type: object
      required: [mfa_token, totp_code]
      properties:
        mfa_token:
          type: string
          description: Short-lived MFA token received from the login response
        totp_code:
          type: string
          description: |
            Either a 6-digit TOTP code (e.g. `123456`) or a 9-character backup code
            in `xxxx-xxxx` format (e.g. `a3bk-p7mw`). The type is auto-detected.
          example: "123456"

    # Health schemas
    GatewayStatus:
      type: object
      properties:
        status:
          type: string
        components:
          type: object
          properties:
            database:
              type: string
            ner_engine:
              type: string
            router:
              type: string
            providers:
              type: object
        uptime:
          type: number
        memory_usage:
          type: object

    GatewayStats:
      type: object
      properties:
        requests_per_second:
          type: number
        avg_response_time:
          type: number
        active_connections:
          type: integer
        cache_hit_rate:
          type: number
        error_rate:
          type: number

    # Vendor catalog schemas
    VendorProfile:
      type: object
      properties:
        id:
          type: string
          description: Unique vendor identifier (e.g. "sentry", "datadog")
        name:
          type: string
          description: Human-readable vendor name
        description:
          type: string
          description: Short description of what the vendor does
        category:
          type: string
          description: Vendor category (e.g. "error-tracking", "apm")
        known_hosts:
          type: array
          items:
            type: string
          description: Hostname patterns associated with this vendor
        data_types:
          type: array
          items:
            type: string
          description: Types of data the vendor receives (e.g. "errors", "traces")
        compliance_frameworks:
          type: array
          items:
            type: string
          description: Compliance frameworks this vendor is relevant to
        integration_methods:
          type: array
          items:
            type: string
          description: Supported integration methods (e.g. "sdk", "http")
        sdk_packages:
          type: array
          items:
            type: string
          description: Official SDK package names
        nonym_sdk:
          type: string
          description: Drop-in Nonym SDK package that protects this vendor's traffic

    VendorIntegration:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: integer
        vendor_id:
          type: string
        vendor_name:
          type: string
        method:
          type: string
          description: Integration method chosen (e.g. "sdk", "http")
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VendorSetupRequest:
      type: object
      required:
        - vendor_id
      properties:
        vendor_id:
          type: string
          description: Vendor ID from the catalog (e.g. "sentry")
        method:
          type: string
          description: Integration method (defaults to "sdk" if omitted)

    # Scanner schemas
    ScanRequest:
      type: object
      properties:
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variable key-value pairs to scan
        config:
          type: object
          additionalProperties:
            type: string
          description: Configuration key-value pairs to scan

    ScanFinding:
      type: object
      properties:
        vendor_id:
          type: string
          description: Vendor that matched (e.g. "sentry")
        vendor_name:
          type: string
          description: Human-readable vendor name
        indicator:
          type: string
          description: The env/config key that triggered the match
        value:
          type: string
          description: Masked version of the detected value
        protected:
          type: boolean
          description: Whether the value is already routed through Nonym
        risk:
          type: string
          enum: [high, medium, low]
          description: Risk level of the unprotected credential
        description:
          type: string
          description: Human-readable explanation of the finding

    ScanResult:
      type: object
      properties:
        scanned_at:
          type: string
          format: date-time
        total_vendors:
          type: integer
          description: Number of vendors checked in the catalog
        findings:
          type: array
          items:
            $ref: '#/components/schemas/ScanFinding'
        protected:
          type: integer
          description: Number of findings already protected by Nonym
        unprotected:
          type: integer
          description: Number of findings NOT yet protected by Nonym
        instructions:
          type: object
          additionalProperties:
            type: string
          description: Quick-start instructions keyed by vendor_id

    # Compliance report schemas
    EntityCount:
      type: object
      properties:
        entity_type:
          type: string
          description: NER entity type (e.g. "PERSON", "EMAIL")
        count:
          type: integer

    DailyCount:
      type: object
      properties:
        date:
          type: string
          format: date
        count:
          type: integer

    ReportSummary:
      type: object
      properties:
        total_requests:
          type: integer
        protected_requests:
          type: integer
        blocked_requests:
          type: integer
        total_redactions:
          type: integer
        unique_entity_types:
          type: integer
        compliance_score:
          type: number
          description: Score in the range [0, 100] representing compliance posture

    ComplianceReport:
      type: object
      properties:
        framework:
          type: string
          description: Canonical framework name (GDPR, HIPAA, or PCI-DSS)
        citation:
          type: string
          description: Relevant regulatory article or section reference
        generated_at:
          type: string
          format: date-time
        organization_id:
          type: integer
        time_range:
          type: string
          description: Time window label (7d, 30d, or 90d)
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        summary:
          $ref: '#/components/schemas/ReportSummary'
        entity_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/EntityCount'
        daily_activity:
          type: array
          items:
            $ref: '#/components/schemas/DailyCount'
        estimated_exposure_averted:
          type: integer
          description: Estimated number of PII items prevented from reaching vendors
        recommendations:
          type: array
          items:
            type: string
          description: Framework-specific compliance recommendations

    ComplianceReportMeta:
      type: object
      description: Summary entry returned by the list endpoint
      properties:
        framework:
          type: string
        citation:
          type: string
        description:
          type: string
        endpoint:
          type: string
          description: URL path to fetch the full report for this framework

    # Benchmark schemas
    BenchmarkResult:
      type: object
      properties:
        label:
          type: string
          description: Human-readable benchmark name
        p50_ms:
          type: number
          description: Median latency in milliseconds
        p95_ms:
          type: number
          description: 95th-percentile latency in milliseconds
        p99_ms:
          type: number
          description: 99th-percentile latency in milliseconds
        throughput:
          type: string
          description: Requests-per-second figure (e.g. "2 400 req/s")
        description:
          type: string
          description: What this benchmark measures

    LiveBenchmark:
      type: object
      properties:
        sample_size:
          type: integer
          description: Number of transactions sampled
        avg_processing_ms:
          type: number
          description: Average observed processing time in milliseconds
        period:
          type: string
          description: Time window used for the live sample (e.g. "last 1 hour")

    BenchmarkReport:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        environment:
          type: string
          description: Runtime environment description
        go_version:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/BenchmarkResult'
        live_stats:
          $ref: '#/components/schemas/LiveBenchmark'
          nullable: true
          description: Real-time stats from recent transactions (null if no data)
        methodology:
          type: string
          description: Explanation of how benchmarks were produced

    # ── V2 Scanner schemas ────────────────────────────────────────────────────

    VendorConnection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: integer
        vendor:
          type: string
          example: sentry
        display_name:
          type: string
          example: Sentry Production
        status:
          type: string
          enum: [connected, disconnected, error]
          description: Credential connection status — whether the stored credentials are valid and reachable
        scan_status:
          type: string
          enum: [idle, scanning]
          description: Current scan activity — `scanning` while a scan job is actively running, `idle` otherwise
        auth_type:
          type: string
          enum: [api_key, oauth]
        credentials:
          type: object
          description: Credential values are masked (e.g. `sk_****xxxx`) — never returned in plain text
          additionalProperties: true
        settings:
          type: object
          additionalProperties: true
        connected_at:
          type: string
          format: date-time
          nullable: true
        last_scan_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VendorConnectionCreateRequest:
      type: object
      required: [vendor]
      properties:
        vendor:
          type: string
          description: |
            Vendor slug for a third-party monitoring or analytics service (e.g. `sentry`, `datadog`).
            AI proxy providers such as `openai` and `anthropic` are managed via the AI proxy
            configuration and cannot be added as scanner vendor connections.
          example: sentry
        auth_type:
          type: string
          enum: [api_key, oauth]
          default: api_key
        credentials:
          type: object
          description: |
            Vendor-specific credential fields required to authenticate with the vendor API.

            **Sentry** — create an Auth Token at *Sentry → Settings → Account → API → Auth Tokens*
            with scopes `org:read`, `project:read`, and `event:read`.
            Pass it as `{"api_token": "<your-token>"}`. Optionally include `"org_slug"` to tag the connection.
            Accepted key names: `api_token`, `token`, `api_key`, `auth_token`.

            **Datadog** — provide `{"api_key": "...", "app_key": "..."}`.

            **Stripe** — provide `{"api_key": "sk_live_..."}`.

            **Mixpanel** — provide `{"service_account": "...", "secret": "..."}`.
          additionalProperties: true
        settings:
          type: object
          additionalProperties: true
        display_name:
          type: string
          description: Human-readable label. Defaults to capitalised vendor name.

    ConnectionResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          description: Human-readable outcome message
        events_accessible:
          type: integer
          nullable: true
          description: |
            Vendor-specific count returned on a successful test.
            For **Sentry** this is the number of organizations accessible with the token.
        connection:
          allOf:
            - $ref: '#/components/schemas/VendorConnection'
          nullable: true
          description: |
            The updated vendor connection record after the test, with credentials masked.
            Present only when a saved connection record exists for this org + vendor.
            Use this object to update local state — `status` will be `connected` on success
            or `error` on failure.

    Scan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: integer
        vendor_ids:
          type: array
          items:
            type: string
          description: Vendor names included in this scan
        status:
          type: string
          enum: [pending, running, done, failed]
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        findings_count:
          type: integer
        error_message:
          type: string
          nullable: true
        triggered_by:
          type: string
          enum: [manual, scheduled, onboarding]
        created_at:
          type: string
          format: date-time

    Finding:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: integer
        scan_id:
          type: string
          format: uuid
        vendor_connection_id:
          type: string
          format: uuid
        vendor:
          type: string
          example: sentry
        data_type:
          type: string
          enum: [email, phone, name, ip_address, api_key, token, financial, health]
        risk_level:
          type: string
          enum: [high, medium, low]
        title:
          type: string
        description:
          type: string
        location:
          type: string
          nullable: true
          description: Field path or source location where the data was found
        endpoint:
          type: string
          nullable: true
          description: API endpoint or URL associated with the finding
        occurrences:
          type: integer
          description: Number of times this finding has been observed
        sample_masked:
          type: string
          nullable: true
          description: Masked sample of the detected value
        status:
          type: string
          enum: [open, resolved, suppressed]
        compliance_impact:
          type: array
          items:
            $ref: '#/components/schemas/ComplianceImpact'
        fixes:
          type: array
          items:
            $ref: '#/components/schemas/Fix'
        first_seen_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          type: integer
          nullable: true
          description: User ID who resolved the finding
        created_at:
          type: string
          format: date-time

    ComplianceImpact:
      type: object
      properties:
        framework:
          type: string
          enum: [GDPR, SOC2, HIPAA]
        article:
          type: string
          description: Relevant article or control reference
        risk_level:
          type: string
          enum: [high, medium, low]

    Fix:
      type: object
      properties:
        language:
          type: string
          description: Programming language for the code snippet
          example: go
        code:
          type: string
          description: Code snippet showing how to remediate the finding
        description:
          type: string
          description: Plain-English description of the fix

    ScannerReport:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: integer
        framework:
          type: string
          enum: [GDPR, SOC2, HIPAA, Custom]
        time_range:
          type: string
          example: last_30_days
        options:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [pending, generating, done, failed]
        file_url:
          type: string
          nullable: true
          description: URL of the generated report file (populated when status is `done`)
        share_token:
          type: string
          nullable: true
          description: Token for the public share link
        generated_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the share link expires (30 days after generation)
        created_at:
          type: string
          format: date-time

    FindingCounts:
      type: object
      properties:
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        total:
          type: integer

    FrameworkStatus:
      type: object
      properties:
        violations:
          type: integer
          description: Number of open findings that impact this framework
        status:
          type: string
          enum: [ok, warning, critical]
          description: "`ok` = 0 violations, `warning` = 1–5, `critical` = 6+"

    ComplianceSnapshot:
      type: object
      properties:
        gdpr:
          $ref: '#/components/schemas/FrameworkStatus'
        soc2:
          $ref: '#/components/schemas/FrameworkStatus'
        hipaa:
          $ref: '#/components/schemas/FrameworkStatus'

    ScannerOverview:
      type: object
      properties:
        vendors_connected:
          type: integer
          description: Number of vendor connections with status `connected`
        findings:
          $ref: '#/components/schemas/FindingCounts'
        risk_score:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall risk score derived from open finding counts
        compliance:
          $ref: '#/components/schemas/ComplianceSnapshot'
        last_scan_at:
          type: string
          format: date-time
          nullable: true
          description: Completion time of the most recent scan

    FlowNode:
      type: object
      properties:
        id:
          type: string
          description: "`app` for the user's application node, UUID for vendor nodes"
        label:
          type: string
        type:
          type: string
          enum: [app, vendor]

    FlowEdge:
      type: object
      properties:
        from:
          type: string
          description: Source node ID
        to:
          type: string
          description: Destination node ID
        findings_count:
          type: integer
          description: Number of open findings on this data-flow edge
        risk_level:
          type: string
          enum: [high, medium, low]
          description: Highest risk level among findings on this edge

    # ── Events & Webhooks schemas ─────────────────────────────────────────────

    Event:
      type: object
      properties:
        id:
          type: string
          example: evt_1711234567890
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          enum: [pii_detected, request_blocked, provider_error, rate_limit_exceeded]
        pii_type:
          type: string
          description: Type of PII involved (e.g. `EMAIL`, `PHONE`, `SSN`)
          nullable: true
        action:
          type: string
          enum: [anonymized, blocked, detected]
        request_id:
          type: string
        user_id:
          type: string
          nullable: true
        organization_id:
          type: integer
        provider:
          type: string
          nullable: true
          description: Upstream provider slug (e.g. `openai`, `sentry`)
        model:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [open, resolved, ignored]
        description:
          type: string
          nullable: true
        compliance_frameworks:
          type: array
          items:
            type: string
          description: Compliance frameworks this event is attributed to (e.g. `["GDPR", "HIPAA"]`)

    EventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        total:
          type: integer
          format: int64
        has_more:
          type: boolean
        limit:
          type: integer
        offset:
          type: integer

    Webhook:
      type: object
      properties:
        id:
          type: string
          example: wh_1711234567890
        url:
          type: string
          format: uri
          example: https://your-server.com/nonym-webhook
        events:
          type: array
          items:
            type: string
          description: Event types this webhook subscribes to
          example: [pii_detected, request_blocked]
        secret:
          type: string
          description: HMAC-SHA256 signing secret (omitted from GET responses for security)
          nullable: true
        status:
          type: string
          enum: [active, disabled, failed]
        created_at:
          type: string
          format: date-time
        last_trigger:
          type: string
          format: date-time
          nullable: true
        user_id:
          type: string
        organization_id:
          type: integer

    WebhookRequest:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
          description: HTTPS endpoint that will receive POST deliveries
        events:
          type: array
          items:
            type: string
            enum: [pii_detected, request_blocked, provider_error, rate_limit_exceeded]
          description: Event types to subscribe to
        secret:
          type: string
          description: Optional HMAC-SHA256 signing secret for verifying deliveries

    WebhookTestResult:
      type: object
      properties:
        success:
          type: boolean
        status_code:
          type: integer
          description: HTTP status code returned by the target endpoint
          nullable: true
        response_body:
          type: string
          description: First 4 KB of the response body from the target endpoint
          nullable: true
        error:
          type: string
          description: Error message if delivery failed (network error, timeout, etc.)
          nullable: true
        payload:
          type: object
          description: The test payload that was delivered

    # ── Dashboard schemas ─────────────────────────────────────────────────────

    DashboardLayoutResponse:
      type: object
      properties:
        widgets:
          type: array
          items:
            $ref: '#/components/schemas/WidgetConfig'

    WidgetConfig:
      type: object
      properties:
        id:
          type: string
          example: stat-total-requests
        type:
          type: string
          example: stat_card
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        endpoint:
          type: string
          description: URL to fetch data for this widget
          example: /api/v1/dashboard/widgets/stat-total-requests
        refresh_interval_seconds:
          type: integer
          description: How often the UI should poll this widget's endpoint
        grid:
          $ref: '#/components/schemas/GridPlacement'
        display:
          $ref: '#/components/schemas/DisplayOptions'

    GridPlacement:
      type: object
      properties:
        row:
          type: integer
        col_span:
          type: integer
          description: Number of 12-column grid columns to span
        order:
          type: integer
          description: Render order within the row

    DisplayOptions:
      type: object
      properties:
        color_scheme:
          type: string
          enum: [blue, green, red, purple]
        icon:
          type: string
          nullable: true
        value_format:
          type: string
          enum: [number, percent, duration_ms]
        threshold_warning:
          type: number
          nullable: true
        threshold_critical:
          type: number
          nullable: true

    StatCardData:
      type: object
      properties:
        value:
          type: number
        unit:
          type: string
          nullable: true
        delta:
          type: number
          description: Change vs the previous equivalent period
        delta_period:
          type: string
          example: vs last 24h

    SuccessRateData:
      type: object
      properties:
        success_rate:
          type: number
          format: float
          description: Percentage of requests processed without error (0–100)
        redacted_requests:
          type: integer
          format: int64
        total_requests:
          type: integer
          format: int64

    ProtectionSummaryData:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              label:
                type: string
              value:
                description: Numeric or string summary value
              color:
                type: string

    GatewayStatusData:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        uptime:
          type: integer
          format: int64
          description: Seconds since process start
        components:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              name:
                type: string
              status:
                type: string
              provider:
                type: boolean
        memory_usage:
          type: object
          properties:
            heap:
              type: integer
              format: int64
              description: Heap memory in bytes
            stack:
              type: integer
              format: int64
            total:
              type: integer
              format: int64

    TopProvidersData:
      type: object
      properties:
        providers:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
              label:
                type: string
              requests:
                type: integer
                format: int64
              percent:
                type: number
                format: float
              color:
                type: string

    ActivityChartData:
      type: object
      properties:
        period_label:
          type: string
          example: Last 24 hours
        points:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              count:
                type: integer
                format: int64

    LiveStatsData:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              label:
                type: string
              value:
                type: number
              format:
                type: string
                enum: [number, percent, duration_ms]
              color_rule:
                type: object
                nullable: true
                properties:
                  threshold_warning:
                    type: number
                  threshold_critical:
                    type: number
                  direction:
                    type: string
                    enum: [higher_is_worse, lower_is_worse]