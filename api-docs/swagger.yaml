                $ref: '#/components/schemas/Error'

  /api/v1/scanner/flows:
    get:
      tags: [Scanner]
      summary: Data-flow graph
      description: Returns nodes (your application + each vendor connection) and edges (data flows with finding counts and risk levels) for rendering a data-flow diagram.
      security:
