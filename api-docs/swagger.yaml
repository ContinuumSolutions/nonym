openapi: 3.0.3
info:
  title: Nonym API
  description: |
    A high-performance Privacy Air-Gap middleware that intercepts data between internal systems and external AI models.
    Acts as a transparent reverse proxy that detects and anonymizes PII in real-time, ensuring sensitive data never leaves your infrastructure.

    ## Authentication

    This API uses two authentication methods:
    - **Bearer Token Authentication** for dashboard/management endpoints (obtained via login)
    - **API Key Authentication** for proxy endpoints (using X-API-Key header)

    ## Features

    - **Real-time PII Detection**: Email, SSN, credit cards, API keys, phone numbers, IP addresses
    - **Smart Anonymization**: Context-preserving tokenization with secure de-anonymization
    - **Intelligent Routing**: Content-based routing (sensitive → local LLM, general → cloud AI)
    - **Strict Mode**: Block requests with high-sensitivity data entirely
    - **Real-time Dashboard**: Comprehensive monitoring via web interface
  version: 1.0.0
  contact:
    name: Continuum Solutions
    email: support@continuumsolutions.com
  license:
    name: Commercial License

servers:
  - url: http://localhost:8000
    description: Development server
  - url: https://gateway.your-domain.com
    description: Production server

tags:
  - name: Health
    description: Health check, status, and documentation endpoints
  - name: Authentication
    description: User authentication and session management
  - name: Users
    description: User profile and management
  - name: API Keys
    description: API key management for proxy authentication
  - name: Organizations
    description: Organization management
  - name: Team
    description: Team member management
  - name: Security
    description: Security settings and session management
  - name: Analytics
    description: Statistics and analytics
  - name: Protection
    description: Protection events and monitoring
  - name: Proxy
    description: AI provider proxy endpoints

paths:
  # Health endpoints
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns the health status of the gateway
      responses:
        '200':
          description: Gateway is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: integer
                    example: 1647123456
                  version:
                    type: string
                    example: "1.0.0"

  /gateway/status:
    get:
      tags: [Health]
      summary: Detailed gateway status
      description: Returns detailed component status information
      responses:
        '200':
          description: Detailed status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayStatus'

  /gateway/stats:
    get:
      tags: [Health]
      summary: Performance statistics
      description: Returns performance statistics and metrics
      responses:
        '200':
          description: Performance statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayStats'

  # Debug endpoint
  /api/v1/debug:
    get:
      tags: [Health]
      summary: Debug information
      description: Returns debug information about the gateway
      responses:
        '200':
          description: Debug information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  build_time:
                    type: string
                  git_commit:
                    type: string
                  uptime:
                    type: string

  # Authentication endpoints
  /api/v1/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: |
        Creates a new user account with flexible name input support.

        **Name Input Options:**
        - Single field: `name: "John Doe"` (automatically split into first/last)
        - Separate fields: `first_name: "John", last_name: "Doe"`

        **Organization Options:**
        - Create new: Provide `organization` name
        - Join existing: Provide `organization_id` (UUID)

        Uses atomic database transactions to ensure data consistency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              single_name_format:
                summary: Using single name field
                value:
                  email: "user@nonym.io"
                  password: "my-password"
                  name: "John Doe"
                  organization: "Demo"
              separate_name_fields:
                summary: Using separate name fields
                value:
                  email: "john.doe@example.com"
                  password: "password123"
                  first_name: "John"
                  last_name: "Doe"
                  organization: "Example Corp"
              join_existing_org:
                summary: Joining existing organization
                value:
                  email: "user@company.com"
                  password: "password123"
                  name: "New User"
                  organization_id: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                message: "User registered successfully"
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                expires_at: "2024-03-17T10:30:00Z"
                user:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  email: "user@nonym.io.io"
                  first_name: "John"
                  last_name: "Doe"
                  full_name: "John Doe"
                  role: "owner"
                  organization_id: "987fcdeb-51a2-43d7-8f9e-123456789abc"
                  is_active: true
                  email_verified: false
                  created_at: "2024-03-16T10:30:00Z"
                organization:
                  id: "987fcdeb-51a2-43d7-8f9e-123456789abc"
                  name: "Demo"
                  slug: "demo"
                  description: "Organization for John Doe"
                  owner_id: "123e4567-e89b-12d3-a456-426614174000"
                  is_active: true
                  created_at: "2024-03-16T10:30:00Z"
        '400':
          description: Invalid registration data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticates a user and returns a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: User logout
      description: Invalidates the user's session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully

  /api/v1/auth/me:
    get:
      tags: [Users]
      summary: Get user profile
      description: Returns the current user's profile information
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # API Key management
  /api/v1/api-keys:
    get:
      tags: [API Keys]
      summary: List API keys
      description: Returns all API keys for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/APIKey'
    post:
      tags: [API Keys]
      summary: Create API key
      description: Creates a new API key for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIKeyCreateRequest'
      responses:
        '201':
          description: API key created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyCreateResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/api-keys/{id}/full:
    get:
      tags: [API Keys]
      summary: Get full API key
      description: Returns the complete API key for copying (security sensitive)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: API key ID
      responses:
        '200':
          description: Full API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    type: string
                  warning:
                    type: string
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/api-keys/{id}/revoke:
    patch:
      tags: [API Keys]
      summary: Revoke API key
      description: Revokes an API key, making it unusable
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: API key ID
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Delete API key
      description: Permanently deletes an API key
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: API key ID
      responses:
        '200':
          description: API key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # Organization management
  /api/v1/organization:
    get:
      tags: [Organizations]
      summary: Get organization info
      description: Returns organization information for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Organization information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
    put:
      tags: [Organizations]
      summary: Update organization info
      description: Updates organization information
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdateRequest'
      responses:
        '200':
          description: Organization updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'

  # Team management
  /api/v1/team/members:
    get:
      tags: [Team]
      summary: List team members
      description: Returns all team members in the organization
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of team members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamMember'
    post:
      tags: [Team]
      summary: Invite team member
      description: Sends an invitation to join the team
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamInviteRequest'
      responses:
        '201':
          description: Invitation sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/v1/team/members/{id}:
    delete:
      tags: [Team]
      summary: Remove team member
      description: Removes a team member from the organization
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Team member UUID
      responses:
        '200':
          description: Team member removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # Security settings
  /api/v1/security/2fa:
    put:
      tags: [Security]
      summary: Update two-factor authentication
      description: Enables or disables two-factor authentication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                secret:
                  type: string
      responses:
        '200':
          description: 2FA updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/v1/security/sessions/{id}:
    delete:
      tags: [Security]
      summary: Terminate session
      description: Terminates a specific user session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '200':
          description: Session terminated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/v1/security/settings:
    put:
      tags: [Security]
      summary: Update security settings
      description: Updates various security settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password_policy:
                  type: object
                session_timeout:
                  type: integer
                login_attempts:
                  type: integer
      responses:
        '200':
          description: Security settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # Analytics and statistics
  /api/v1/statistics:
    get:
      tags: [Analytics]
      summary: Get system statistics
      description: Returns comprehensive system statistics and analytics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: System statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsResponse'

  /api/v1/transactions:
    get:
      tags: [Analytics]
      summary: Get transaction history
      description: Returns paginated transaction history
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Number of transactions to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of transactions to skip
      responses:
        '200':
          description: Transaction history
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  limit:
                    type: integer
                  offset:
                    type: integer

  # Protection events
  /api/v1/protection-events:
    get:
      tags: [Protection]
      summary: Get protection events
      description: Returns protection events with filtering options
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: eventType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
        - name: timeRange
          in: query
          schema:
            type: string
            default: 24h
      responses:
        '200':
          description: Protection events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtectionEventsResponse'

  /api/v1/protection-stats:
    get:
      tags: [Protection]
      summary: Get protection statistics
      description: Returns protection statistics and metrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Protection statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtectionStatsResponse'

  # Documentation endpoints
  /api/docs:
    get:
      tags: [Health]
      summary: API documentation
      description: Returns the Swagger UI for API documentation
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

  /swagger.yaml:
    get:
      tags: [Health]
      summary: OpenAPI specification
      description: Returns the OpenAPI/Swagger specification file
      responses:
        '200':
          description: OpenAPI specification
          content:
            text/yaml:
              schema:
                type: string

  /docs:
    get:
      tags: [Health]
      summary: Documentation redirect
      description: Redirects to the API documentation
      responses:
        '302':
          description: Redirect to /api/docs

  /gateway/auth-test:
    get:
      tags: [Health]
      summary: Authentication test endpoint
      description: Test endpoint for authentication functionality
      responses:
        '200':
          description: Authentication test result
          content:
            application/json:
              schema:
                type: object

  # AI Provider Proxy Endpoints
  /v1/chat/completions:
    post:
      tags: [Proxy]
      summary: Chat completions proxy
      description: Proxy endpoint for OpenAI-compatible chat completions with PII protection
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: OpenAI-compatible chat completion request
              example:
                model: "gpt-3.5-turbo"
                messages:
                  - role: "user"
                    content: "Hello, my email is john@example.com"
      responses:
        '200':
          description: Chat completion response (PII anonymized)
          content:
            application/json:
              schema:
                type: object
                description: OpenAI-compatible response with anonymized content
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/completions:
    post:
      tags: [Proxy]
      summary: Completions proxy
      description: Proxy endpoint for text completions with PII protection
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Completion response
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/embeddings:
    post:
      tags: [Proxy]
      summary: Embeddings proxy
      description: Proxy endpoint for embeddings with PII protection
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Embeddings response
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/models:
    get:
      tags: [Proxy]
      summary: List models proxy
      description: Proxy endpoint to list available models
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: List of available models
        '401':
          description: API key required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login endpoint
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for accessing proxy endpoints

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    # Authentication schemas
    RegisterRequest:
      type: object
      description: |
        User registration request. Supports two name formats:
        1. Single name field: `name: "John Doe"` (will be split into first/last)
        2. Separate fields: `first_name: "John", last_name: "Doe"`
        At least one name format must be provided.
      properties:
        email:
          type: string
          format: email
          description: User's email address
        password:
          type: string
          minLength: 8
          description: User's password (minimum 8 characters)
        name:
          type: string
          description: Full name (e.g., "John Doe") - alternative to first_name/last_name
        first_name:
          type: string
          description: First name (when using separate name fields)
        last_name:
          type: string
          description: Last name (when using separate name fields)
        organization:
          type: string
          description: Organization name (creates new org if not joining existing)
        organization_id:
          type: string
          format: uuid
          description: UUID of existing organization to join
        invite_code:
          type: string
          description: Invitation code for joining organization
      required:
        - email
        - password
      oneOf:
        - required: [name]
        - required: [first_name, last_name]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User's email address
        password:
          type: string
          description: User's password
        organization_id:
          type: string
          format: uuid
          description: Optional organization UUID for multi-org users
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        organization:
          $ref: '#/components/schemas/Organization'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: User's unique identifier (UUID)
        email:
          type: string
          format: email
          description: User's email address
        first_name:
          type: string
          description: User's first name
        last_name:
          type: string
          description: User's last name
        full_name:
          type: string
          description: User's full name (computed from first_name + last_name)
        role:
          type: string
          enum: [owner, admin, user, viewer]
          description: User's role in the organization
        organization_id:
          type: string
          format: uuid
          description: Organization UUID this user belongs to
        is_active:
          type: boolean
          description: Whether the user account is active
        email_verified:
          type: boolean
          description: Whether the user's email is verified
        created_at:
          type: string
          format: date-time
          description: When the user account was created
        updated_at:
          type: string
          format: date-time
          description: When the user account was last updated
        last_login:
          type: string
          format: date-time
          nullable: true
          description: When the user last logged in
        organization:
          $ref: '#/components/schemas/Organization'

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: User's unique identifier (UUID)
        email:
          type: string
          format: email
          description: User's email address
        first_name:
          type: string
          description: User's first name
        last_name:
          type: string
          description: User's last name
        full_name:
          type: string
          description: User's full name (computed from first_name + last_name)
        role:
          type: string
          enum: [owner, admin, user, viewer]
          description: User's role in the organization
        organization_id:
          type: string
          format: uuid
          description: Organization UUID this user belongs to
        is_active:
          type: boolean
          description: Whether the user account is active
        email_verified:
          type: boolean
          description: Whether the user's email is verified
        created_at:
          type: string
          format: date-time
          description: When the user account was created
        last_login:
          type: string
          format: date-time
          nullable: true
          description: When the user last logged in
        organization:
          $ref: '#/components/schemas/Organization'

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Organization's unique identifier (UUID)
        name:
          type: string
          description: Organization name
        slug:
          type: string
          description: URL-friendly organization identifier
        description:
          type: string
          description: Organization description
        owner_id:
          type: string
          format: uuid
          description: UUID of the organization owner
        is_active:
          type: boolean
          description: Whether the organization is active
        created_at:
          type: string
          format: date-time
          description: When the organization was created
        updated_at:
          type: string
