  /api/v1/reports/share/{token}:
    get:
      tags: [Reports]
      summary: Get shared report (public)
      description: Returns a report by its share token. No authentication required. Returns `410 Gone` if the share link has expired.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shared report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScannerReport'
        '404':
