  # ── Vendor Connections ────────────────────────────────────────────────────────

  /api/v1/vendor-connections/test:
    post:
      tags: [Vendor Connections]
      summary: Test credentials inline
      description: |
        Validates vendor credentials against the real vendor API.

        If a connection record for this org + vendor already exists, its `status` is updated
        to `connected` (on success) or `error` (on failure) automatically — no separate
        `/:id/test` call is needed.

        If no connection record exists yet (e.g. first-time setup), use this to validate
        credentials before calling `POST /api/v1/vendor-connections` to save them.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vendor, credentials]
              properties:
                vendor:
                  type: string
                  example: sentry
                auth_type:
                  type: string
                  enum: [api_key, oauth]
                  default: api_key
                credentials:
                  type: object
                  additionalProperties: true
            example:
              vendor: sentry
              auth_type: api_key
              credentials:
                api_token: sntryu_xxxxxxxxxxxx
      responses:
        '200':
          description: Test result — includes `connection` with updated status when a saved record exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResult'
              example:
                success: true
                message: "Connected — 1 organization(s) accessible"
                events_accessible: 1
                connection:
                  id: "c8dcf5f3-9aad-431f-9f51-6cfdf5e9f452"
                  org_id: 2
                  vendor: "sentry"
                  display_name: "Sentry"
                  status: "connected"
                  scan_status: "idle"
                  auth_type: "api_key"
                  credentials:
                    api_token: "sntryu*****...7f16"
                    org_slug: "********"
                  settings:
                    scan_frequency: "daily"
                  connected_at: "2026-03-23T16:20:00Z"
                  last_scan_at: null
                  created_at: "2026-03-23T16:16:47.068Z"
                  updated_at: "2026-03-23T16:20:00Z"
        '400':
          description: Missing vendor or credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vendor-connections:
    get:
      tags: [Vendor Connections]
      summary: List vendor connections
      description: Returns all vendor connections for the authenticated organisation. Credential values are masked in the response.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [connected, disconnected, error]
          description: Filter by connection status
      responses:
        '200':
          description: List of vendor connections
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: array
                    items:
                      $ref: '#/components/schemas/VendorConnection'
                  total:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Vendor Connections]
      summary: Create vendor connection
      description: Adds a new vendor connection for the org. Credentials are stored encrypted and never returned in plain text.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorConnectionCreateRequest'
            example:
              vendor: sentry
              auth_type: api_key
              credentials:
                api_token: sntryu_xxxxxxxxxxxx
                org_slug: my-org
              display_name: Sentry Production
      responses:
        '201':
          description: Vendor connection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorConnection'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vendor-connections/{id}:
    delete:
      tags: [Vendor Connections]
      summary: Delete vendor connection
      description: Permanently removes a vendor connection and its stored credentials.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted successfully
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vendor-connections/{id}/test:
    post:
      tags: [Vendor Connections]
      summary: Test vendor connection
      description: Validates the stored credentials against the vendor and updates the connection status to `connected` or `error`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Test result — always includes `connection` with updated status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResult'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vendor connection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/vendor-connections/{id}/scan:
    post:
      tags: [Vendor Connections]
      summary: Trigger scan for a single vendor
      description: Creates and starts a scan scoped to this vendor connection. Returns the new scan ID immediately; use `GET /api/v1/scans/{id}/status` to stream progress.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Scan started
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan_id:
                    type: string
                    format: uuid
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vendor connection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Scans ────────────────────────────────────────────────────────────────────

  /api/v1/scans:
    get:
      tags: [Scans]
      summary: List scans
      description: Returns paginated scan history for the org, newest first.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of scans
          content:
            application/json:
              schema:
                type: object
                properties:
                  scans:
                    type: array
                    items:
                      $ref: '#/components/schemas/Scan'
                  total:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Scans]
      summary: Start a new scan
      description: |
        Creates and immediately starts a scan across all connected vendors (or a specified subset).
        Returns `202 Accepted` with the scan ID. Stream real-time progress via `GET /api/v1/scans/{id}/status`.

        When `vendor_ids` is provided the scan runs against those specific connections **regardless of their current status** (useful for scanning a newly added connection before it has been tested). When `vendor_ids` is omitted only `connected` vendors are included.

        **Per-vendor behaviour:**
        - **OpenAI / Anthropic** — reads from Nonym's own proxy transaction log. Fetches up to 500 transactions (last 30 days) that had at least one redaction and surfaces the already-identified PII entities (EMAIL, PHONE, SSN, CREDIT_CARD, IP_ADDRESS, API_KEY, PERSON, …) as findings. No external API call is made. These vendors are auto-connected on creation — no credentials required.
        - **Sentry** — calls the Sentry API (`/api/0/organizations/`, `/projects/`, `/events/`). Fetches up to 500 real error events across all accessible projects and scans each event's message, user context (email, IP, username), tags, extra fields, breadcrumbs, and exception values for PII.
        - **All other vendors** — falls back to running PII detection over the stored credential and settings field values until a dedicated connector is added.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                vendor_ids:
                  type: array
                  items:
                    type: string
                  description: Vendor connection UUIDs or vendor name slugs (e.g. `"sentry"`) to scan. When provided, runs against these connections regardless of status. Omit to scan all `connected` vendors.
            example:
              vendor_ids: []
      responses:
        '202':
          description: Scan started
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan_id:
                    type: string
                    format: uuid
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: No connected vendors available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/scans/{id}:
    get:
      tags: [Scans]
      summary: Get scan
      description: Returns the full state of a single scan job.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Scan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scan'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/scans/{id}/status:
    get:
      tags: [Scans]
      summary: Stream scan progress (SSE)
      description: |
        Returns a Server-Sent Events stream of scan progress events.

        Event types:
        - `progress` — phase and percentage update (`{"event":"progress","phase":"fetching","vendor":"sentry","percent":20}`)
        - `finding` — a new finding was persisted (`{"event":"finding","finding_id":"...","vendor":"sentry","risk_level":"high"}`)
        - `done` — scan completed (`{"event":"done","findings_count":3,"scan_id":"..."}`)
        - `error` — scan failed (`{"event":"error","message":"...","scan_id":"..."}`)

        If the scan is already complete when the request arrives the terminal event is sent immediately and the stream closes.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Scan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Findings ──────────────────────────────────────────────────────────────────

  /api/v1/findings:
    get:
      tags: [Findings]
      summary: List findings
      description: Returns paginated findings for the org with optional filters.
      security:
        - bearerAuth: []
      parameters:
        - name: vendor
          in: query
          required: false
          schema:
            type: string
          description: Filter by vendor name (e.g. `sentry`)
        - name: risk_level
          in: query
          required: false
          schema:
            type: string
            enum: [high, medium, low]
        - name: data_type
          in: query
          required: false
          schema:
            type: string
            enum: [email, phone, name, ip_address, api_key, token, financial, health]
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, resolved, suppressed]
          description: Defaults to returning all statuses
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  findings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Finding'
                  total:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/findings/{id}:
    get:
      tags: [Findings]
      summary: Get finding
      description: Returns a single finding by ID.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Finding details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Finding'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Finding not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags: [Findings]
      summary: Update finding status
      description: Changes the status of a finding to `open`, `resolved`, or `suppressed`. Setting `resolved` records the resolved_at timestamp.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [open, resolved, suppressed]
            example:
              status: resolved
      responses:
        '200':
          description: Updated finding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Finding'
        '400':
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Reports ───────────────────────────────────────────────────────────────────

  /api/v1/reports:
    get:
      tags: [Reports]
      summary: List scanner reports
      description: Returns all generated compliance reports for the org, newest first.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScannerReport'
                  total:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/reports/generate:
    post:
      tags: [Reports]
      summary: Generate a compliance report
      description: |
        Creates a report record and queues async generation. Returns `202 Accepted` immediately.
        Poll `GET /api/v1/reports/{id}` until `status` is `done`, then download via `GET /api/v1/reports/{id}/download`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [framework, time_range]
              properties:
                framework:
                  type: string
                  enum: [GDPR, SOC2, HIPAA, Custom]
                time_range:
                  type: string
                  description: Human-readable or ISO range (e.g. `last_30_days`, `2026-01-01/2026-03-31`)
                options:
                  type: object
                  description: Framework-specific generation options
            example:
              framework: GDPR
              time_range: last_30_days
      responses:
        '202':
          description: Report generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id:
                    type: string
                    format: uuid
        '400':
          description: Validation error (invalid framework or missing time_range)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/reports/{id}:
    get:
      tags: [Reports]
      summary: Get report
      description: Returns the current state of a report. Poll this endpoint until `status` is `done` or `failed`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScannerReport'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/reports/{id}/download:
    get:
      tags: [Reports]
      summary: Download report file
      description: Redirects (`302`) to the signed download URL for the generated report file. Returns `422` if the report is not yet ready.
      security:
        - bearerAuth: []
