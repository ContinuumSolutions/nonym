# Redis configuration for Nonym
# Optimized for session storage and caching

# Network
bind 0.0.0.0
port 6379
protected-mode yes
timeout 300

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (disabled for session storage to improve performance)
save ""
appendonly no

# Security
# requirepass ""  # Disabled for development

# Logging
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
tcp-backlog 511

# Sessions and cache settings
# Default TTL for sessions: 24 hours
# Default TTL for cache: 1 hour

# Disable some features we don't need
lua-time-limit 5000

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100
