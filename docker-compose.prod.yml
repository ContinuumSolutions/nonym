version: '3.8'

name: sovereign-privacy-gateway-prod

# Production-ready configuration for Sovereign Privacy Gateway
services:

  # ── Main Privacy Gateway ──────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        - CGO_ENABLED=1
        - GOOS=linux
        - GOARCH=amd64
    ports:
      - "8080:8080"   # Main privacy gateway endpoint
      - "8081:8081"   # Dashboard interface
    environment:
      - PORT=8080
      - DASHBOARD_PORT=8081
      - DATABASE_PATH=/data/gateway.db
      - LOG_LEVEL=info
      - LOCAL_LLM_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - STRICT_MODE=${STRICT_MODE:-false}
      - RETENTION_DAYS=${RETENTION_DAYS:-30}
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-100}
    volumes:
      - gateway-data:/data
      - gateway-logs:/app/logs
    networks:
      - gateway-network
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    user: "1001:1001"
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp

  # ── Local LLM (Ollama) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_HOST=0.0.0.0
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '8.0'
        reservations:
          memory: 4G
          cpus: '2.0'
    security_opt:
      - no-new-privileges:true

  # ── Model Initialization ───────────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - gateway-network
    command: >
      sh -c "
        echo 'Waiting for Ollama service...' &&
        sleep 60 &&
        ollama pull llama3.2:1b &&
        ollama pull phi3:mini &&
        echo 'Models downloaded successfully'
      "
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── Production Reverse Proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - gateway-logs:/var/log/nginx
      - nginx-cache:/var/cache/nginx
    networks:
      - gateway-network
    depends_on:
      - gateway
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true

  # ── Monitoring Stack ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - gateway-network
      - monitoring-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    profiles: ["monitoring", "full"]
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - monitoring-network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel,grafana-simple-json-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
    restart: unless-stopped
    depends_on:
      - prometheus
    profiles: ["monitoring", "full"]
    security_opt:
      - no-new-privileges:true

  # ── Alerting ───────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - monitoring-network
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    restart: unless-stopped
    profiles: ["monitoring", "full"]
    security_opt:
      - no-new-privileges:true

  # ── Log Management ─────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    networks:
      - monitoring-network
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    profiles: ["logging", "full"]
    security_opt:
      - no-new-privileges:true

  promtail:
    image: grafana/promtail:latest
    volumes:
      - gateway-logs:/var/log/gateway:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring-network
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki
    profiles: ["logging", "full"]

  # ── Database Backup ────────────────────────────────────────────────────────
  backup:
    image: alpine:latest
    volumes:
      - gateway-data:/data:ro
      - backup-storage:/backups
    environment:
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    command: >
      sh -c "
        apk add --no-cache sqlite &&
        while true; do
          echo 'Starting backup...' &&
          timestamp=$(date +%Y%m%d_%H%M%S) &&
          sqlite3 /data/gateway.db \".backup /backups/gateway_backup_$${timestamp}.db\" &&
          echo 'Backup completed: gateway_backup_'$${timestamp}'.db' &&
          find /backups -name 'gateway_backup_*.db' -mtime +${BACKUP_RETENTION_DAYS:-7} -delete &&
          echo 'Old backups cleaned up' &&
          sleep 86400
        done
      "
    restart: unless-stopped
    profiles: ["backup", "full"]
    security_opt:
      - no-new-privileges:true

# ── Production Network Configuration ───────────────────────────────────────────
networks:
  gateway-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: spg-gateway

  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    driver_opts:
      com.docker.network.bridge.name: spg-monitoring

# ── Persistent Storage ─────────────────────────────────────────────────────────
volumes:
  # Gateway data (SQLite database)
  gateway-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/gateway

  # Model storage (Ollama)
  ollama-models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/ollama

  # Application logs
  gateway-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/logs

  # Monitoring data
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/prometheus

  grafana-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/grafana

  alertmanager-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/alertmanager

  loki-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/loki

  # Backup storage
  backup-storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/backups

  # Nginx cache
  nginx-cache:
    driver: local

# ── Production Environment Configurations ──────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# Apply logging to all services
x-service-defaults: &service-defaults
  logging: *default-logging
  security_opt:
    - no-new-privileges:true
