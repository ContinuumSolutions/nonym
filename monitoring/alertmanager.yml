global:
  # Global Alertmanager configuration
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@sovereignprivacy.local'
  smtp_auth_username: ''
  smtp_auth_password: ''

# Route tree for alert notifications
route:
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 4h

# Alert notification receivers
receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:8080/webhook/alerts'
        send_resolved: true
        title: 'Privacy Gateway Alert'
        text: 'Alert: {{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:8080/webhook/alerts'
        send_resolved: true
        title: 'CRITICAL: Privacy Gateway Alert'
        text: 'CRITICAL Alert: {{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'
    # Add email configuration for critical alerts
    # email_configs:
    #   - to: 'admin@yourcompany.com'
    #     subject: 'CRITICAL: Privacy Gateway Alert'
    #     body: |
    #       Alert: {{ .GroupLabels.alertname }}
    #       Summary: {{ .CommonAnnotations.summary }}
    #       Description: {{ .CommonAnnotations.description }}

  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://localhost:8080/webhook/alerts'
        send_resolved: true
        title: 'WARNING: Privacy Gateway Alert'
        text: 'Warning: {{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'

# Inhibition rules to reduce noise
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Alert silencing and grouping
templates:
  - '/etc/alertmanager/templates/*.tmpl'
