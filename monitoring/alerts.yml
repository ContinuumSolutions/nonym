groups:
- name: gateway.rules
  rules:
  - alert: GatewayDown
    expr: up{job="gateway"} == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Privacy Gateway is down"
      description: "Privacy Gateway has been down for more than 5 minutes."

  - alert: HighPIIDetectionRate
    expr: rate(pii_detections_total[5m]) > 0.5
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High PII detection rate"
      description: "PII detection rate is {{ $value }} per second, which is unusually high."

  - alert: DatabaseConnectionFailure
    expr: up{job="postgres"} == 0
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "Database connection failure"
      description: "Cannot connect to PostgreSQL database."

  - alert: RedisConnectionFailure
    expr: up{job="redis"} == 0
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Redis connection failure"
      description: "Cannot connect to Redis cache."

  - alert: HighErrorRate
    expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High error rate"
      description: "Error rate is {{ $value }} errors per second."
